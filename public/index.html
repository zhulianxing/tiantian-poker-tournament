<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Night — TV Display</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1A1A2E; color:#fff; font-family:'Courier New',monospace; height:100vh; overflow:hidden; }
.container { display:flex; flex-direction:column; height:100vh; }
.top-bar { display:flex; justify-content:space-around; padding:12px 20px; background:#0D5C32; font-size:18px; }
.top-bar span { color:#FFD700; font-weight:bold; }
.table-area { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
.seats-top, .seats-bottom { display:flex; gap:40px; justify-content:center; }
.seat { background:#2a2a4a; border-radius:12px; padding:12px 20px; min-width:120px; text-align:center; border:2px solid #333; }
.seat.active { border-color:#E53935; animation:pulse 1s infinite; }
.seat.folded { opacity:0.4; }
.seat.allin { border-color:#FFD700; }
.seat.empty { color:#666; }
.seat .nick { font-size:14px; margin-bottom:4px; }
.seat .chips { font-size:18px; color:#4CAF50; font-weight:bold; }
.seat .status { font-size:12px; margin-top:4px; color:#aaa; }
.community { display:flex; gap:8px; margin:20px 0; }
.card { width:60px; height:84px; background:#F5F5F0; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:bold; }
.card.red { color:#E53935; }
.card.black { color:#000; }
.card.back { background:linear-gradient(135deg,#1a1a3e,#3a3a6e); color:#555; }
.pot { text-align:center; font-size:24px; color:#FFD700; margin:10px 0; }
.bottom-bar { display:flex; justify-content:center; gap:20px; padding:12px; background:#2a2a4a; }
.bottom-bar button { background:#333; color:#fff; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-size:14px; }
.connect-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
.connect-screen input { font-size:24px; padding:12px; text-align:center; width:200px; background:#2a2a4a; color:#FFD700; border:2px solid #FFD700; border-radius:8px; letter-spacing:4px; }
.connect-screen button { margin-top:20px; font-size:20px; padding:12px 40px; background:#4CAF50; color:#fff; border:none; border-radius:8px; cursor:pointer; }
@keyframes pulse { 0%,100%{border-color:#E53935;} 50%{border-color:#FF6666;} }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const SERVER = window.location.origin;
let socket = null;
let tableCode = '';

function renderConnect() {
  document.getElementById('app').innerHTML = `
    <div class="connect-screen">
      <h1 style="color:#FFD700;font-size:48px;margin-bottom:40px;">🃏 Poker Night</h1>
      <p style="color:#aaa;margin-bottom:20px;">输入桌号连接牌桌</p>
      <input id="codeInput" maxlength="6" placeholder="PNDEMO" value="" />
      <button onclick="connect()">连接</button>
      <p style="color:#666;margin-top:30px;font-size:14px;">测试桌号: PNDEMO</p>
    </div>
  `;
  document.getElementById('codeInput').focus();
  document.getElementById('codeInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') connect();
  });
}

function connect() {
  tableCode = document.getElementById('codeInput').value.toUpperCase();
  if (!tableCode) return;
  
  socket = io(SERVER, { path: '/socket.io/' });
  socket.on('connect', () => {
    socket.emit('join_table', tableCode);
    renderTable();
  });
  socket.on('disconnect', () => {
    document.getElementById('app').innerHTML = '<div class="connect-screen"><h1 style="color:#E53935;">已断线，重连中...</h1></div>';
  });
  
  // 事件处理
  socket.on('tournament_activated', (d) => updateStatus('等待玩家入座...', d));
  socket.on('countdown_tick', (d) => updateCountdown(d.remaining));
  socket.on('tournament_started', (d) => updateStatus('比赛开始!', d));
  socket.on('new_hand', (d) => updateStatus(`第 ${d.handNumber} 手`, d));
  socket.on('hand_started', (d) => { updateStatus(`第 ${d.handNumber} 手 - ${d.stage}`, d); updatePot(d.pot); });
  socket.on('stage_changed', (d) => { updateStage(d); });
  socket.on('turn_changed', (d) => { updateActing(d.actingIndex); });
  socket.on('action_result', (d) => { updateAction(d); });
  socket.on('showdown', (d) => { updateShowdown(d); });
  socket.on('hand_result', (d) => { updateStatus(`第 ${d.handNumber} 手结束 - 赢家获得 ${d.pot}`, d); });
  socket.on('blind_level_up', (d) => { updateBlinds(d); });
  socket.on('tournament_finished', (d) => { updateStatus('比赛结束', d); });
}

function renderTable() {
  document.getElementById('app').innerHTML = `
    <div class="container">
      <div class="top-bar">
        <span>桌号: <span id="code">${tableCode}</span></span>
        <span>盲注: <span id="blinds">10/20</span></span>
        <span>级别: <span id="level">1</span></span>
        <span>奖池: <span id="pot">0</span></span>
        <span>倒计时: <span id="countdown">--</span></span>
      </div>
      <div class="table-area">
        <div>
          <div class="seats-top" id="seatsTop"></div>
          <div class="community" id="community"></div>
          <div class="pot" id="potDisplay">底池: 0</div>
          <div class="seats-bottom" id="seatsBottom"></div>
        </div>
      </div>
      <div class="bottom-bar">
        <button onclick="location.reload()">断开</button>
        <span id="statusText" style="color:#aaa;align-self:center;">等待连接...</span>
      </div>
    </div>
  `;
  renderSeats();
}

function renderSeats(players = []) {
  const seatsTop = document.getElementById('seatsTop');
  const seatsBottom = document.getElementById('seatsBottom');
  if (!seatsTop) return;
  
  const seats = [];
  for (let i = 0; i < 6; i++) {
    const p = players.find(x => x.seatIndex === i);
    seats.push(p || { seatIndex: i, nickname: '空座', chipCount: 0, status: 'empty' });
  }
  
  seatsTop.innerHTML = seats.slice(0, 3).map(s => seatHTML(s)).join('');
  seatsBottom.innerHTML = seats.slice(3, 6).reverse().map(s => seatHTML(s)).join('');
}

function seatHTML(s) {
  let cls = 'seat';
  if (s.status === 'folded') cls += ' folded';
  if (s.status === 'allin' || s.status === 'allIn') cls += ' allin';
  if (s.status === 'empty') cls += ' empty';
  const statusText = {waiting:'等待',playing:'坐席中',folded:'弃牌',allin:'All-In',allIn:'All-In',eliminated:'淘汰',empty:'空座'}[s.status] || s.status;
  return `<div class="${cls}" id="seat-${s.seatIndex}">
    <div class="nick">${s.nickname || '空座'}</div>
    <div class="chips">${s.chipCount || 0}</div>
    <div class="status">${statusText}</div>
  </div>`;
}

function updateStatus(text, data) {
  const el = document.getElementById('statusText');
  if (el) el.textContent = text;
}
function updateCountdown(sec) {
  const el = document.getElementById('countdown');
  if (el) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }
}
function updatePot(pot) {
  const el = document.getElementById('potDisplay');
  if (el) el.textContent = `底池: ${pot}`;
  const el2 = document.getElementById('pot');
  if (el2) el2.textContent = pot;
}
function updateBlinds(d) {
  const el = document.getElementById('blinds');
  if (el) el.textContent = `${d.sb}/${d.bb}`;
  const el2 = document.getElementById('level');
  if (el2) el2.textContent = d.level;
}
function updateStage(d) {
  const stageNames = { preflop:'翻牌前', flop:'翻牌', turn:'转牌', river:'河牌', showdown:'摊牌' };
  updateStatus(stageNames[d.stage] || d.stage, d);
  updatePot(d.pot);
  if (d.communityCards) {
    const el = document.getElementById('community');
    if (el) {
      el.innerHTML = d.communityCards.map(c => {
        const red = c.suit === '♥' || c.suit === '♦';
        return `<div class="card ${red?'red':'black'}">${c.rank}${c.suit}</div>`;
      }).join('');
    }
  }
}
function updateActing(idx) {
  document.querySelectorAll('.seat').forEach(s => s.classList.remove('active'));
  if (idx >= 0) {
    const el = document.getElementById(`seat-${idx}`);
    if (el) el.classList.add('active');
  }
}
function updateAction(d) {
  const el = document.getElementById(`seat-${d.seatIndex || 0}`);
  // Could show action text
}
function updateShowdown(d) {
  if (d.winners && d.winners.length > 0) {
    const w = d.winners[0];
    updateStatus(`🎉 ${w.playerId || '玩家'} 赢得 ${d.pot}! (${w.handName || ''})`, d);
  }
}

// 启动
renderConnect();
</script>
</body>
</html>
