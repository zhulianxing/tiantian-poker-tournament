<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天天扑克锦标赛 — TV Display</title>
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* 色板与 TV App ui/theme/Color.kt 一致 */
:root {
  --bg-dark:#0A0A0F; --table-green:#0E5A32; --table-green-dark:#062B17;
  --rim:#3A2E18; --rim-light:#4A3A20; --card-white:#FAFAF5;
  --gold:#FFD700; --gold-bright:#FFE887; --gold-dark:#C9A227;
  --red:#E5484D; --chip-green:#46A758;
  --card-bg:#1A1A24; --seat-bg:#1A1A24; --seat-border:#2A2A38;
  --text-1:#FFFFFF; --text-2:rgba(255,255,255,.7); --text-3:rgba(255,255,255,.5);
  --card-back:#0F2440; --card-back-inner:#152B45; --card-back-diamond:#1E3A5F; --card-back-spade:#2A5080;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-dark); color:var(--text-1); font-family:"PingFang SC","Microsoft YaHei",sans-serif; height:100vh; overflow:hidden; }
button { font-family:inherit; }

/* ============ 通用 ============ */
.page { display:flex; flex-direction:column; height:100vh; padding:16px 24px; background:linear-gradient(180deg,var(--bg-dark),rgba(6,43,23,.35)); }
.gold { color:var(--gold); }
.qr-card { display:flex; flex-direction:column; align-items:center; gap:8px; background:var(--card-bg); border:1px solid var(--seat-border); border-radius:16px; padding:16px; }
.qr-card .qr-box { background:#fff; padding:8px; border-radius:8px; border:2px solid rgba(255,215,0,.5); }
.qr-card .qr-title { color:var(--gold); font-size:16px; font-weight:bold; }
.qr-card .qr-desc { color:var(--text-2); font-size:12px; text-align:center; }

/* ============ Connect 页 ============ */
.connect-page { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:24px; background:linear-gradient(180deg,var(--bg-dark),rgba(6,43,23,.3)); overflow:auto; padding:32px; }
.connect-title { color:var(--gold); font-size:48px; font-weight:bold; }
.connect-sub { color:var(--text-2); font-size:20px; }
.connect-input { width:360px; max-width:80vw; background:var(--card-bg); border:2px solid var(--seat-border); border-radius:10px; color:var(--text-1); font-size:26px; letter-spacing:6px; text-align:center; padding:14px; outline:none; text-transform:uppercase; }
.connect-input:focus { border-color:var(--gold); }
.connect-hint { color:var(--text-3); font-size:13px; margin-top:-16px; }
.connect-error { color:var(--red); font-size:14px; margin-top:-16px; min-height:18px; }
.connect-btn { width:360px; max-width:80vw; height:56px; border:none; border-radius:10px; background:var(--gold); color:#000; font-size:18px; font-weight:bold; cursor:pointer; }
.connect-btn:disabled { background:rgba(255,215,0,.3); color:rgba(0,0,0,.3); cursor:default; }
.connect-qr { display:flex; align-items:center; gap:24px; margin-top:16px; }

/* ============ Idle 页 ============ */
.idle-header { text-align:center; margin:12px 0 24px; }
.idle-header h1 { color:var(--gold); font-size:42px; }
.idle-header p { color:var(--text-2); font-size:18px; margin-top:4px; }
.idle-main { flex:1; display:flex; align-items:center; justify-content:space-evenly; gap:24px; }
.carousel { width:420px; max-width:40vw; height:280px; background:var(--card-bg); border:1px solid var(--seat-border); border-radius:16px; padding:24px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; }
.carousel .dots { display:flex; gap:6px; }
.carousel .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,215,0,.3); }
.carousel .dot.on { width:8px; height:8px; background:var(--gold); }
.carousel h2 { color:var(--gold); font-size:24px; }
.carousel pre { color:var(--text-1); font-size:16px; line-height:24px; font-family:inherit; white-space:pre-wrap; }
.idle-footer { display:flex; justify-content:space-evenly; background:var(--card-bg); border:1px solid var(--seat-border); border-radius:12px; padding:16px; }
.info-chip { text-align:center; }
.info-chip .lbl { color:var(--text-3); font-size:12px; }
.info-chip .val { font-size:20px; font-weight:bold; margin-top:2px; }

/* ============ Waiting 页（registering） ============ */
.wait-header { display:flex; justify-content:space-between; align-items:center; }
.wait-header h1 { color:var(--gold); font-size:28px; }
.wait-header .code { color:var(--text-2); font-size:16px; margin-top:2px; }
.wait-countdown { text-align:right; }
.wait-countdown .lbl { color:var(--text-3); font-size:12px; }
.wait-countdown .sec { color:var(--red); font-size:36px; font-weight:bold; }
.param-row { display:flex; justify-content:space-evenly; background:var(--card-bg); border:1px solid var(--seat-border); border-radius:12px; padding:16px; margin-top:16px; }
.wait-main { flex:1; display:flex; gap:16px; margin-top:16px; min-height:0; }
.player-panel { flex:1; background:var(--card-bg); border:1px solid var(--seat-border); border-radius:12px; padding:16px; display:flex; flex-direction:column; }
.player-panel .pp-head { display:flex; justify-content:space-between; align-items:center; }
.player-panel .pp-head h3 { color:var(--gold); font-size:18px; }
.player-panel .pp-count { font-size:16px; font-weight:bold; }
.player-list { flex:1; overflow-y:auto; margin-top:12px; display:flex; flex-direction:column; gap:8px; }
.player-row { display:flex; align-items:center; gap:12px; background:var(--seat-bg); border-radius:8px; padding:12px; }
.player-row .avatar { width:40px; height:40px; border-radius:50%; background:var(--card-bg); border:1px solid var(--seat-border); display:flex; align-items:center; justify-content:center; font-size:20px; }
.player-row .nick { flex:1; font-size:16px; }
.player-row .badge { background:rgba(255,215,0,.2); color:var(--gold); font-size:12px; border-radius:4px; padding:4px 8px; }
.player-empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:16px; text-align:center; }
.wait-remain { text-align:center; color:var(--text-2); font-size:14px; margin-top:8px; }
.wait-qrs { width:220px; display:flex; flex-direction:column; gap:12px; }
.progress-track { height:6px; border-radius:3px; background:var(--seat-border); margin-top:16px; }
.progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold),var(--red)); transition:width 1s linear; }
.wait-hint { text-align:center; color:var(--gold); font-size:18px; font-weight:bold; margin-top:12px; }

/* ============ Table 页（started） ============ */
.top-bar { display:flex; justify-content:space-between; align-items:center; height:52px; background:var(--seat-bg); border:1px solid var(--seat-border); border-radius:12px; padding:0 24px; }
.top-bar .group { display:flex; gap:24px; }
.table-center { flex:1; display:flex; gap:10px; margin:8px 0; min-height:0; }
.table-felt-wrap { flex:1; position:relative; }
.felt { position:absolute; inset:8% 2%; border-radius:130px; background:radial-gradient(ellipse at center,var(--rim-light),var(--rim),#241A0C); border:2px solid rgba(201,162,39,.5); padding:14px; }
.felt-inner { width:100%; height:100%; border-radius:116px; background:radial-gradient(ellipse at center,var(--table-green),var(--table-green-dark)); border:1px solid rgba(255,215,0,.25); }
.seat-row { position:absolute; left:4%; right:4%; display:flex; justify-content:space-evenly; z-index:2; }
.seat-row.top { top:0; }
.seat-row.bottom { bottom:0; }
.table-middle { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; z-index:1; }
.stage-badge { color:rgba(255,215,0,.75); font-size:14px; font-weight:bold; letter-spacing:2px; }
.community { display:flex; gap:10px; }
.pot-pill { background:linear-gradient(90deg,rgba(255,215,0,.2),rgba(255,215,0,.1),rgba(255,215,0,.2)); border:1px solid rgba(255,215,0,.5); border-radius:20px; padding:7px 24px; color:var(--gold); font-size:20px; font-weight:bold; letter-spacing:1px; }

/* 座位卡（与 PlayerSeatView 一致） */
.seat { position:relative; width:24%; max-width:240px; min-height:88px; background:var(--seat-bg); border:2px solid var(--seat-border); border-radius:12px; padding:8px 12px; display:flex; flex-direction:column; justify-content:space-between; }
.seat.empty { border-width:1px; opacity:.15; align-items:center; justify-content:center; color:var(--text-3); font-size:14px; }
.seat.folded { opacity:.35; }
.seat.eliminated { opacity:.2; }
.seat.allin { border-color:var(--gold); border-width:3px; }
.seat.acting { border-color:var(--red); border-width:3px; animation:actingBlink 1.2s ease-in-out infinite; }
@keyframes actingBlink { 0%,100%{border-color:rgba(229,72,77,.4);} 50%{border-color:rgba(229,72,77,1);} }
.seat .s-top { display:flex; justify-content:space-between; align-items:center; }
.seat .s-name { display:flex; align-items:center; gap:6px; font-size:16px; font-weight:bold; overflow:hidden; white-space:nowrap; }
.seat .dealer { width:22px; height:22px; border-radius:50%; background:var(--gold); color:#000; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center; flex:none; }
.seat .s-mid { display:flex; justify-content:space-between; align-items:center; }
.seat .s-chips { color:var(--chip-green); font-size:20px; font-weight:bold; }
.seat .s-bet { color:var(--gold); font-size:14px; }
.seat .s-status { font-size:13px; text-align:center; color:var(--text-2); }
.seat .s-status.gold { color:var(--gold); }
.seat .s-status.dim { color:var(--text-3); }
.reveal { position:absolute; left:50%; transform:translateX(-50%); display:flex; gap:4px; z-index:3; }
.reveal.below { bottom:-26px; }
.reveal.above { top:-26px; }

/* 扑克牌（与 PokerCardView 一致） */
.pcard { position:relative; border-radius:8px; background:var(--card-white); border:1.5px solid #999; box-shadow:0 2px 4px rgba(0,0,0,.4); }
.pcard .corner { position:absolute; font-size:.28em; font-weight:bold; line-height:1; }
.pcard .corner.tl { top:4%; left:7%; }
.pcard .corner.br { bottom:4%; right:7%; }
.pcard .suit { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:.5em; }
.pcard.red { color:var(--red); }
.pcard.black { color:#1A1A1A; }
.pcard.back { background:var(--card-back); border-color:#999; }
.pcard.back .back-inner { position:absolute; inset:6%; border-radius:6px; background:var(--card-back-inner); display:flex; align-items:center; justify-content:center; }
.pcard.back .back-diamond { width:55%; height:55%; border-radius:4px; background:var(--card-back-diamond); display:flex; align-items:center; justify-content:center; color:var(--card-back-spade); font-size:.4em; }
.pcard.back .back-dot { position:absolute; width:10%; height:10%; border-radius:2px; background:rgba(255,215,0,.5); }

/* 赢家横幅 */
.winner-banner { position:fixed; top:68px; left:50%; transform:translateX(-50%); z-index:50; background:linear-gradient(90deg,rgba(255,215,0,.4),rgba(255,215,0,.2),rgba(255,215,0,.4)); border:2px solid var(--gold); border-radius:28px; padding:12px 32px; color:var(--gold); font-size:26px; font-weight:bold; letter-spacing:1px; animation:bannerDrop .35s ease-out; white-space:nowrap; }
@keyframes bannerDrop { from { transform:translate(-50%,-100%); opacity:0; } to { transform:translate(-50%,0); opacity:1; } }

/* 实时排行（与 LeaderboardPanel 一致） */
.leaderboard { background:rgba(26,26,36,.85); border:1px solid var(--seat-border); border-radius:14px; padding:12px 14px; width:210px; align-self:stretch; overflow-y:auto; }
.leaderboard h3 { color:var(--gold); font-size:16px; margin-bottom:10px; }
.lb-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:14px; }
.lb-row .lb-nick { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-row.leader .lb-nick { color:var(--gold); font-weight:bold; }
.lb-row.out { color:var(--text-3); }
.lb-row .lb-chips { color:var(--text-2); font-size:13px; margin-left:10px; }
.lb-row.out .lb-chips { color:var(--text-3); }

/* 底栏 */
.bottom-bar { display:flex; justify-content:space-between; align-items:center; height:56px; background:var(--seat-bg); border:1px solid var(--seat-border); border-radius:12px; padding:0 16px; }
.history { flex:1; min-width:0; }
.history .h-label { color:var(--gold); font-size:12px; font-weight:bold; }
.history .h-entry { color:var(--text-2); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history .h-empty { color:var(--text-3); font-size:12px; }
.disconnect-btn { background:rgba(229,72,77,.2); color:var(--red); border:none; border-radius:8px; padding:12px 24px; font-size:14px; font-weight:bold; cursor:pointer; }

/* ============ Finished 页 ============ */
.finished-page { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; background:radial-gradient(ellipse at center,var(--bg-dark),rgba(6,43,23,.5)); padding:48px; }
.finished-page h1 { color:var(--gold); font-size:42px; margin-bottom:8px; }
.rank-row { width:50%; min-width:300px; display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); border:1px solid var(--seat-border); border-radius:12px; padding:20px; }
.rank-row.first { border:2px solid var(--gold); }
.rank-row .r-name { font-size:24px; font-weight:bold; }
.rank-row.first .r-name { color:var(--gold); }
.rank-row .r-chips { color:var(--chip-green); font-size:20px; font-weight:bold; }
.finished-hint { color:var(--text-3); font-size:14px; margin-top:24px; }

/* 重连提示 */
.reconnect-bar { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(229,72,77,.9); color:#fff; text-align:center; padding:6px; font-size:14px; }

@media (max-width:900px) {
  .idle-main { flex-direction:column; }
  .carousel { max-width:90vw; width:90vw; height:auto; min-height:200px; }
  .wait-main { flex-direction:column; }
  .wait-qrs { width:100%; flex-direction:row; justify-content:center; }
  .leaderboard { display:none; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
// 与 TV App (tv-display) 交互细节保持一致；改动需两边同步
const SERVER = new URLSearchParams(location.search).get('server') || window.location.origin;
const LS_KEY = 'tv_table_code';
const socket = { io: null };

// ============ 全局状态（对齐 TableState） ============
const S = {
  connected: false,
  tableCode: '',
  phase: 'idle',          // idle / registering / started / finished
  displayCode: '',
  blindLevel: 1, sb: 10, bb: 20,
  pot: 0, currentBet: 0,
  communityCards: [],
  seats: [],
  actingIndex: -1,
  dealerIndex: 0,
  countdown: 0,
  handNumber: 0,
  stage: '',
  handHistory: [],
  rankings: [],
  winnerBanner: null,     // {winnerName, winAmount, handName}
  showdownHands: {},      // seatIndex → [card, card]
  connecting: false,
  connectError: '',
  carouselPage: 0,
};

// ============ 工具（与 App 同规则） ============
function fmt(n) { n = Math.floor(n || 0); if (n >= 1e6) return Math.floor(n/1e6)+'M'; if (n >= 1e3) return Math.floor(n/1e3)+'K'; return String(n); }
function fmtChips(n) { return fmt(n); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stageLabel(stage) {
  switch (String(stage).toLowerCase()) {
    case 'preflop': case 'pre-flop': case 'pre_flop': return '翻牌前';
    case 'flop': return '翻牌圈';
    case 'turn': return '转牌圈';
    case 'river': return '河牌圈';
    case 'showdown': return '摊牌';
    default: return String(stage || '').toUpperCase();
  }
}
function phaseLabel(phase) {
  switch (String(phase).toLowerCase()) {
    case 'registering': return '报名中';
    case 'started': case 'playing': return '进行中';
    case 'finished': return '已结束';
    default: return String(phase || '').toUpperCase();
  }
}
function buildActionText(action, amount) {
  switch (String(action).toLowerCase()) {
    case 'fold': return '弃牌';
    case 'check': return '过牌';
    case 'call': return amount > 0 ? `跟注 ${amount}` : '跟注';
    case 'raise': return `加注到 ${amount}`;
    case 'bet': return `下注 ${amount}`;
    case 'allin': case 'all-in': case 'all_in': return `全下 ${amount}`;
    case 'small_blind': return `小盲 ${amount}`;
    case 'big_blind': return `大盲 ${amount}`;
    default: return `${action} ${amount}`.trim();
  }
}
function seatStatusText(st) {
  return { waiting:'等待中', folded:'已弃牌', allin:'全下', eliminated:'淘汰', sitout:'暂离', empty:'空位' }[st] || '';
}
function isRed(card) { return card.suit === '♥' || card.suit === '♦'; }
function cardHTML(card, w, h) {
  const style = `width:${w}px;height:${h}px;font-size:${h}px;`;
  if (!card) {
    return `<div class="pcard back" style="${style}"><div class="back-inner"><div class="back-diamond">♠</div></div><div class="back-dot"></div></div>`;
  }
  const cls = isRed(card) ? 'red' : 'black';
  return `<div class="pcard ${cls}" style="${style}">
    <span class="corner tl">${esc(card.rank)}</span>
    <span class="suit">${esc(card.suit)}</span>
    <span class="corner br">${esc(card.rank)}</span>
  </div>`;
}
function qrHTML(el, url, size) {
  if (!window.QRCode) return;
  el.innerHTML = '';
  new QRCode(el, { text: url, width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
}
function downloadUrl() { return 'https://poker.clawclaw.tech/download'; }
function payUrl() { return `https://poker.clawclaw.tech/pay/pay.html?table=${S.tableCode}`; }

// ============ 页面渲染 ============
const app = document.getElementById('app');

function render() {
  if (!S.connected) { renderConnect(); return; }
  if (S.phase === 'registering') renderWaiting();
  else if (S.phase === 'started') renderTable();
  else if (S.phase === 'finished') renderFinished();
  else renderIdle();
}

function renderConnect() {
  app.innerHTML = `
  <div class="connect-page">
    <div class="connect-title">♠ 天天扑克锦标赛 ♠</div>
    <div class="connect-sub">Connect your table display</div>
    <input id="codeInput" class="connect-input" maxlength="6" placeholder="6-character code" value="${esc(S.tableCode)}" />
    <div class="connect-hint" id="codeHint">${S.tableCode.length}/6 characters</div>
    <div class="connect-error" id="codeError">${esc(S.connectError)}</div>
    <button id="connectBtn" class="connect-btn" ${S.tableCode.length === 6 && !S.connecting ? '' : 'disabled'}>${S.connecting ? 'Connecting…' : 'Connect'}</button>
    <div class="connect-qr">
      <div class="qr-box" id="connectQr"></div>
      <div style="width:200px;">
        <div class="qr-title">Download Player App</div>
        <div class="qr-desc">Scan the QR code with your phone to download the 天天扑克锦标赛 Player App and join the table.</div>
      </div>
    </div>
  </div>`;
  qrHTML(document.getElementById('connectQr'), downloadUrl(), 120);
  const input = document.getElementById('codeInput');
  const btn = document.getElementById('connectBtn');
  input.focus();
  input.addEventListener('input', () => {
    S.tableCode = input.value.replace(/[^a-zA-Z0-9]/g, '').slice(0, 6).toUpperCase();
    input.value = S.tableCode;
    document.getElementById('codeHint').textContent = `${S.tableCode.length}/6 characters`;
    btn.disabled = !(S.tableCode.length === 6 && !S.connecting);
  });
  input.addEventListener('keypress', e => { if (e.key === 'Enter' && S.tableCode.length === 6) connect(S.tableCode); });
  btn.addEventListener('click', () => { if (S.tableCode.length === 6) connect(S.tableCode); });
}

const CAROUSEL = [
  { title: '单桌限血赛规则', content: '初始筹码 1,000\n6人桌 · 单桌赛制\n最后存活者获胜' },
  { title: '盲注递增', content: '起始盲注 10/20\n每 10 分钟翻倍\n合理分配筹码是关键' },
  { title: '开赛条件', content: '满 6 人立即开赛\n或倒计时 5 分钟结束自动开赛\n至少 2 人方可激活赛事' },
  { title: '入座与行为规范', content: '扫码免费入座\n每手操作时限 30 秒\n超时自动弃牌\n保持网络畅通' },
];
let carouselTimer = null;

function renderIdle() {
  const page = CAROUSEL[S.carouselPage % CAROUSEL.length];
  app.innerHTML = `
  <div class="page">
    <div class="idle-header">
      <h1>♠ 天天扑克锦标赛 ♠</h1>
      <p>欢迎光临 · 欢迎入座</p>
    </div>
    <div class="idle-main">
      <div class="qr-card"><div class="qr-box" id="qrDl"></div><div class="qr-title">下载选手 APP</div><div class="qr-desc">扫码下载天天扑克锦标赛选手端 APP</div></div>
      <div class="carousel">
        <div class="dots">${CAROUSEL.map((_, i) => `<div class="dot ${i === S.carouselPage % CAROUSEL.length ? 'on' : ''}"></div>`).join('')}</div>
        <h2>${esc(page.title)}</h2>
        <pre>${esc(page.content)}</pre>
      </div>
      <div class="qr-card"><div class="qr-box" id="qrPay"></div><div class="qr-title">发起赛事付费</div><div class="qr-desc">扫码付费激活本场赛事</div></div>
    </div>
    <div class="idle-footer">
      <div class="info-chip"><div class="lbl">下一场盲注</div><div class="val gold">${S.sb}/${S.bb}</div></div>
      <div class="info-chip"><div class="lbl">人数上限</div><div class="val gold">6人</div></div>
      <div class="info-chip"><div class="lbl">当前状态</div><div class="val gold">等待激活</div></div>
    </div>
  </div>`;
  qrHTML(document.getElementById('qrDl'), downloadUrl(), 180);
  qrHTML(document.getElementById('qrPay'), payUrl(), 180);
  if (!carouselTimer) {
    carouselTimer = setInterval(() => {
      S.carouselPage = (S.carouselPage + 1) % CAROUSEL.length;
      if (S.connected && S.phase === 'idle') renderIdle();
    }, 5000);
  }
}

  <div class="page" style="padding:24px;">
    <div class="wait-header">
      <div>

        <div class="code">赛事编号: ${esc(S.displayCode || S.tableCode)}</div>
      </div>
      ${S.countdown > 0 ? `<div class="wait-countdown"><div class="lbl">开赛倒计时</div><div class="sec">${S.countdown}s</div></div>` : ''}
    </div>
    <div class="param-row">
      <div class="info-chip"><div class="lbl">启动费</div><div class="val gold">¥50</div></div>
      <div class="info-chip"><div class="lbl">初始筹码</div><div class="val gold">1,000</div></div>
      <div class="info-chip"><div class="lbl">盲注</div><div class="val gold">${S.sb}/${S.bb}</div></div>

        ${seated.length === 0
          ? '<div class="player-empty">暂无玩家入座<br>等待玩家扫码加入…</div>'
          : `<div class="player-list">${seated.map(p => `

      </div>

        <div class="qr-card"><div class="qr-box" id="qrPay2"></div><div class="qr-title">发起赛事付费</div><div class="qr-desc">扫码付费激活赛事</div></div>
      </div>
    </div>
    ${S.countdown > 0 ? `<div class="progress-track"><div class="progress-fill" style="width:${progress * 100}%"></div></div>` : ''}
    <div class="wait-hint">赛事已激活，玩家扫码免费入座</div>
  </div>`;
  qrHTML(document.getElementById('qrDl2'), downloadUrl(), 130);
  qrHTML(document.getElementById('qrPay2'), payUrl(), 130);
}

// ============ Table 页 ============
function renderTable() {

  const totalCount = S.seats.filter(s => s.status !== 'empty').length;
  app.innerHTML = `
  <div class="page" style="padding:16px;">
    <div class="top-bar">
      <div class="group">
        <div class="info-chip"><div class="lbl">桌号</div><div class="val gold">${esc(S.tableCode || '---')}</div></div>
        <div class="info-chip"><div class="lbl">阶段</div><div class="val">${S.stage ? stageLabel(S.stage) : phaseLabel(S.phase)}</div></div>
      </div>
      <div class="group">
        <div class="info-chip"><div class="lbl">盲注</div><div class="val gold">L${S.blindLevel}</div></div>
        <div class="info-chip"><div class="lbl">小盲/大盲</div><div class="val" style="color:var(--chip-green)">${S.sb}/${S.bb}</div></div>
        <div class="info-chip"><div class="lbl">手牌</div><div class="val">#${S.handNumber}</div></div>
      </div>
      <div class="group">
        <div class="info-chip"><div class="lbl">玩家</div><div class="val" style="color:var(--chip-green)">${activeCount}/${totalCount}</div></div>
        ${S.countdown > 0 ? `<div class="info-chip"><div class="lbl">开赛</div><div class="val" style="color:var(--red)">${S.countdown}s</div></div>` : ''}
        ${S.pot > 0 ? `<div class="info-chip"><div class="lbl">底池</div><div class="val gold">${fmt(S.pot)}</div></div>` : ''}
      </div>
    </div>
    <div class="table-center">
      <div class="table-felt-wrap">
        <div class="felt"><div class="felt-inner"></div></div>
        <div class="seat-row top">${[3, 4, 5].map(i => seatHTML(i, true)).join('')}</div>
        <div class="table-middle">
          ${S.stage ? `<div class="stage-badge">${stageLabel(S.stage)}</div>` : ''}
          <div class="community">${[0,1,2,3,4].map(i => cardHTML(S.communityCards[i] || null, 64, 90)).join('')}</div>
          ${S.pot > 0 ? `<div class="pot-pill">底池&nbsp;&nbsp;${fmt(S.pot)}</div>` : ''}
        </div>
        <div class="seat-row bottom">${[0, 1, 2].map(i => seatHTML(i, false)).join('')}</div>
      </div>
      <div class="leaderboard" id="leaderboard"></div>
    </div>
    <div class="bottom-bar">
      <div class="history">
        <div class="h-label">牌局记录</div>
        ${S.handHistory.length === 0
          ? '<div class="h-empty">暂无记录</div>'
          : S.handHistory.slice(-2).reverse().map(h => `<div class="h-entry">${esc(h)}</div>`).join('')}
      </div>
      <button class="disconnect-btn" onclick="manualDisconnect()">断开连接</button>
    </div>
  </div>
  ${S.winnerBanner ? `<div class="winner-banner">🏆 ${esc(S.winnerBanner.winnerName)} 赢得 ${fmt(S.winnerBanner.winAmount)}${S.winnerBanner.handName ? ' · ' + esc(S.winnerBanner.handName) : ''}</div>` : ''}`;
  renderLeaderboard();
}

function seatHTML(index, topRow) {
  const seat = S.seats.find(s => s.seatIndex === index) || { seatIndex: index, status: 'empty' };
  if (seat.status === 'empty') return `<div class="seat empty">空位</div>`;
  const st = String(seat.status || '').toLowerCase();
  const cls = ['seat'];
  if (st === 'folded') cls.push('folded');
  if (st === 'eliminated') cls.push('eliminated');
  if (st === 'allin') cls.push('allin');
  if (seat.seatIndex === S.actingIndex) cls.push('acting');
  const reveal = S.showdownHands[index];
  const revealHTML = (reveal && reveal.length)
    ? `<div class="reveal ${topRow ? 'below' : 'above'}">${reveal.slice(0, 2).map(c => cardHTML(c, 36, 50)).join('')}</div>`
    : '';
  let statusLine = '';
  if (seat.lastAction) {
    const gold = st === 'allin' ? 'gold' : '';
    statusLine = `<div class="s-status ${gold}">${esc(seat.lastAction)}</div>`;
  } else if (st !== 'playing') {
    const dim = (st === 'folded' || st === 'eliminated') ? 'dim' : '';
    const gold = (st === 'allin' || st === 'waiting') ? 'gold' : '';
    statusLine = `<div class="s-status ${dim} ${gold}">${seatStatusText(st)}</div>`;
  }
  return `<div class="${cls.join(' ')}">
    <div class="s-top">
      <div class="s-name"><span>${esc(seat.avatar || '🃏')}</span><span>${esc(seat.nickname || '玩家' + (index + 1))}</span></div>
      ${seat.seatIndex === S.dealerIndex ? '<div class="dealer">D</div>' : ''}
    </div>
    <div class="s-mid">
      <span class="s-chips">${fmtChips(seat.chipCount || 0)}</span>
      ${seat.currentBet > 0 ? `<span class="s-bet">下注 ${seat.currentBet}</span>` : ''}
    </div>
    ${statusLine}
    ${revealHTML}
  </div>`;
}

// 实时排行：与 TV App LeaderboardPanel 排序/字段保持一致（改动需两边同步）
function renderLeaderboard() {
  const el = document.getElementById('leaderboard');
  if (!el) return;
  const ranked = S.seats
    .filter(p => p.status !== 'empty')
    .sort((a, b) => {
      const ae = a.status === 'eliminated' ? 1 : 0;
      const be = b.status === 'eliminated' ? 1 : 0;
      if (ae !== be) return ae - be;
      if ((b.chipCount || 0) !== (a.chipCount || 0)) return (b.chipCount || 0) - (a.chipCount || 0);
      return a.seatIndex - b.seatIndex;
    });
  el.innerHTML = '<h3>实时排行</h3>' + ranked.map((p, i) => {
    const out = p.status === 'eliminated';
    const leader = i === 0 && !out;
    return `<div class="lb-row ${out ? 'out' : ''} ${leader ? 'leader' : ''}">
      <span class="lb-nick">${leader ? '🥇 ' : ''}#${i + 1} ${esc(p.nickname || '')}</span>
      <span class="lb-chips">${out ? '淘汰' : (p.chipCount ?? 0)}</span>
    </div>`;
  }).join('');
}

// ============ Finished 页 ============
let finishedTimer = null;
function renderFinished() {
  const medals = ['🥇', '🥈', '🥉'];
  app.innerHTML = `
  <div class="finished-page">
    <h1>🏆 赛事结束 🏆</h1>
    ${(S.rankings || []).map((r, i) => `
      <div class="rank-row ${i === 0 ? 'first' : ''}">
        <span class="r-name">${medals[i] || (i + 1) + '.'} ${esc(r.nickname || 'Player ' + (i + 1))}</span>
        <span class="r-chips">${fmtChips(Number(r.chips ?? r.finalChips ?? 0))}</span>
      </div>`).join('')}
    <div class="finished-hint">5 秒后自动返回待机画面…</div>
  </div>`;
  if (!finishedTimer) {
    finishedTimer = setTimeout(() => {
      finishedTimer = null;
      resetToIdle();
    }, 5000);
  }
}

// 对齐 ViewModel.resetToIdle：本地回 idle，等服务端 table_state 再同步
function resetToIdle() {
  Object.assign(S, {
    phase: 'idle', rankings: [], seats: [], pot: 0, communityCards: [],
    stage: '', handNumber: 0, countdown: 0, winnerBanner: null, showdownHands: {},
  });
  render();
}

// ============ 连接 ============
function connect(code) {
  S.tableCode = code;
  S.connecting = true;
  S.connectError = '';
  localStorage.setItem(LS_KEY, code); // 绑定桌号，对齐 SharedPreferences
  renderConnect();

  if (socket.io) { socket.io.removeAllListeners(); socket.io.disconnect(); }

  // 服务端要求匿名围观连接必须带 role=tv，否则握手被拒绝
  const io2 = io(SERVER, { path: '/socket.io/', query: { role: 'tv' }, reconnection: true });
  socket.io = io2;

  io2.on('connect', () => {
    io2.emit('join_table', S.tableCode);
    S.connected = true;
    S.connecting = false;
    S.connectError = '';
    const bar = document.getElementById('reconnectBar');
    if (bar) bar.remove();
    render();
  });
  io2.on('connect_error', (err) => {
    S.connecting = false;
    if (!S.connected) {
      S.connectError = '连接失败: ' + err.message;
      renderConnect();
    }
  });
  io2.on('disconnect', () => {
    S.connected = false;
    // 对齐 App：断线回连接页，socket.io 自动重连后恢复原画面
    if (!document.getElementById('reconnectBar')) {
      const bar = document.createElement('div');
      bar.id = 'reconnectBar';
      bar.className = 'reconnect-bar';
      bar.textContent = '已断线，重连中…';
      document.body.appendChild(bar);
    }
    render();
  });

  // ============ 事件处理（对齐 TableViewModel.handleEvent） ============
  io2.on('table_state', (d) => {
    S.phase = String(d.phase || S.phase).toLowerCase();
    S.blindLevel = d.blindLevel ?? S.blindLevel;
    S.sb = d.sb ?? S.sb;
    S.bb = d.bb ?? S.bb;
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? S.currentBet;
    if (d.communityCards) S.communityCards = d.communityCards;
    if (d.seats) S.seats = d.seats;
    S.actingIndex = d.actingIndex ?? -1;
    S.dealerIndex = d.dealerIndex ?? 0;
    S.handNumber = d.handNumber ?? S.handNumber;
    S.stage = d.stage ?? S.stage;
    S.displayCode = d.displayCode ?? S.displayCode;
    S.countdown = d.countdown ?? S.countdown;
    render();
  });
  io2.on('tournament_activated', (d) => {
    S.phase = 'registering';
    if (d.displayCode) S.displayCode = d.displayCode;
    render();
  });
  io2.on('countdown_tick', (d) => {
    S.countdown = d.remaining ?? 0;
    render();
  });
  io2.on('tournament_started', (d) => {
    if (d.seats) S.seats = d.seats;
    S.phase = 'started';
    S.countdown = 0;
    render();
  });
  io2.on('new_hand', (d) => {
    // 保留公共牌到 hand_started 才清除
    S.stage = 'preflop';
    S.actingIndex = -1;
    if (d.dealerIndex != null) S.dealerIndex = d.dealerIndex;
    render();
  });
  io2.on('hole_cards', () => { /* TV 忽略底牌 */ });
  io2.on('hand_started', (d) => {
    S.handNumber = d.handNumber ?? S.handNumber;
    S.stage = d.stage || 'preflop';
    S.pot = d.pot ?? 0;
    S.currentBet = d.currentBet ?? 0;
    S.actingIndex = d.actingIndex ?? -1;
    if (d.seats) S.seats = d.seats;
    if (d.dealerIndex != null) S.dealerIndex = d.dealerIndex;
    S.communityCards = [];   // 新一手清公共牌
    S.winnerBanner = null;   // 清上一手赢家横幅
    S.showdownHands = {};    // 清上一手摊牌明牌
    render();
  });
  io2.on('stage_changed', (d) => {
    S.stage = d.stage || S.stage;
    if (d.communityCards) S.communityCards = d.communityCards;
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? 0;
    S.actingIndex = d.actingIndex ?? -1;
    if (d.seats && d.seats.length) S.seats = d.seats;
    render();
  });
  io2.on('turn_changed', (d) => {
    S.actingIndex = d.actingIndex ?? -1;
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? S.currentBet;
    if (d.seats && d.seats.length) S.seats = d.seats;
    render();
  });
  io2.on('action_result', (d) => {
    const actionText = buildActionText(d.action, d.amount);
    if (d.seats && d.seats.length) {
      S.seats = d.seats.map(seat => ({
        ...seat,
        lastAction: seat.playerId === d.playerId ? actionText : (seat.lastAction || ''),
      }));
    } else {
      // 服务端没带座位时的本地兜底（与 App 同规则）
      S.seats = S.seats.map(seat => {
        if (seat.playerId !== d.playerId) return seat;
        const a = String(d.action).toLowerCase();
        let chips = seat.chipCount || 0;
        if (a === 'call' || a === 'raise' || a === 'bet') chips -= (d.amount || 0);
        if (a === 'allin' || a === 'all-in' || a === 'all_in') chips = 0;
        return {
          ...seat,
          lastAction: actionText,
          status: a === 'fold' ? 'folded' : (a.startsWith('all') ? 'allin' : seat.status),
          chipCount: Math.max(0, chips),
          currentBet: ['raise', 'bet', 'call'].includes(a) ? d.amount : seat.currentBet,
        };
      });
    }
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? S.currentBet;
    S.actingIndex = d.actingIndex ?? -1;
    addHistory(actionText, d.playerId);
    render();
  });
  io2.on('showdown', (d) => {
    S.stage = 'showdown';
    S.pot = d.pot ?? S.pot;
    if (d.communityCards && d.communityCards.length) S.communityCards = d.communityCards;
    if (d.allResults) {
      const map = {};
      d.allResults.forEach(r => {
        if (r.seatIndex >= 0 && r.holeCards && r.holeCards.length) map[r.seatIndex] = r.holeCards;
      });
      if (Object.keys(map).length) S.showdownHands = map;
    }
    render();
  });
  io2.on('hand_result', (d) => {
    if (d.seats && d.seats.length) {
      S.seats = d.seats;
    } else if (d.winnerId) {
      S.seats = S.seats.map(s => s.playerId === d.winnerId ? { ...s, chipCount: (s.chipCount || 0) + (d.pot || 0) } : s);
    }
    const winner = S.seats.find(s => s.playerId === d.winnerId);
    const winnerName = (winner && winner.nickname) || d.winnerId || '';
    S.pot = 0;
    S.currentBet = 0;
    S.actingIndex = -1;
    S.winnerBanner = winnerName ? { winnerName, winAmount: d.winAmount ?? d.pot ?? 0, handName: d.handName || '' } : null;
    addHistory(`第${d.handNumber}手：${winnerName} 赢得底池 ${d.pot}`);
    render();
  });
  io2.on('player_eliminated', (d) => {
    S.seats = S.seats.map(s => s.playerId === d.playerId ? { ...s, status: 'eliminated' } : s);
    render();
  });
  io2.on('tournament_finished', (d) => {
    S.rankings = d.rankings || [];
    S.phase = 'finished';
    render();
  });
  io2.on('blind_level_up', (d) => {
    S.blindLevel = d.level ?? S.blindLevel;
    S.sb = d.sb ?? S.sb;
    S.bb = d.bb ?? S.bb;
    render();
  });
  io2.on('seat_joined', (d) => {
    if (d.seatIndex == null || d.seatIndex < 0) return;
    const idx = d.seatIndex;
    const existing = S.seats.find(s => s.seatIndex === idx);
    const seat = {
      seatIndex: idx, playerId: d.playerId || '', nickname: d.nickname || '',
      avatar: d.avatar || '🃏', status: 'waiting', chipCount: d.chipCount ?? 1000,
      currentBet: 0, lastAction: '',
    };
    if (existing) Object.assign(existing, seat);
    else S.seats.push(seat);
    render();
  });
  io2.on('seat_left', (d) => {
    if (d.seatIndex == null || d.seatIndex < 0) return;
    S.seats = S.seats.map(s => s.seatIndex === d.seatIndex ? { seatIndex: d.seatIndex, status: 'empty' } : s);
    render();
  });
}

function addHistory(text, playerId) {
  const seat = S.seats.find(s => s.playerId === playerId);
  const name = seat && seat.nickname ? seat.nickname : '';
  S.handHistory = [...S.handHistory, name ? `${name}: ${text}` : text].slice(-20);
}

// 手动断开：清绑定回连接页（对齐 App disconnect）
function manualDisconnect() {
  localStorage.removeItem(LS_KEY);
  if (socket.io) { socket.io.removeAllListeners(); socket.io.disconnect(); socket.io = null; }
  S.connected = false;
  S.phase = 'idle';
  S.connectError = '';
  render();
}

// ============ 启动：有绑定桌号则自动重连（对齐 App LaunchedEffect） ============
const savedCode = localStorage.getItem(LS_KEY);
if (savedCode) {
  connect(savedCode);
} else {
  render();
}
</script>
