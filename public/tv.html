<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天天扑克锦标赛 — TV Display</title>
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<style>
:root{--gold:#FFD700;--gold2:#c9a227;--bg:#07070c;--panel:rgba(255,255,255,.035);--line:rgba(201,162,39,.22);--txt:#e8e8ec;--dim:#9c9ca8;--navH:clamp(44px,6.5vh,64px)}
* { margin:0; padding:0; box-sizing:border-box; }
/* 面向投影/电视大屏：所有尺寸随视口高度缩放（1080p 基准，4K 同比放大），小窗有 clamp 下限与紧凑模式；视觉风格对齐首页 */
body { background:var(--bg); color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; height:100vh; height:100dvh; overflow:hidden; }
/* 首页同款氛围辉光 */
.glow { position:fixed; border-radius:50%; pointer-events:none; filter:blur(90px); z-index:0; }
.glow-a { top:-260px; left:50%; transform:translateX(-50%); width:820px; height:820px; background:rgba(13,90,50,.34); }
.glow-b { top:38%; left:-260px; width:560px; height:560px; background:rgba(201,162,39,.10); }
.glow-c { bottom:-200px; right:-200px; width:620px; height:620px; background:rgba(255,215,0,.07); }
#app { position:relative; z-index:1; }
/* 首页同款导航（fixed 悬浮，不占牌桌布局） */
nav { position:fixed; top:0; left:0; right:0; height:var(--navH); z-index:100; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); background:rgba(7,7,12,.72); border-bottom:1px solid rgba(201,162,39,.14); }
.nav-in { height:100%; padding:0 2vw; display:flex; align-items:center; gap:0.8vw; }
.nav-in img { width:clamp(26px,4.2vh,40px); height:clamp(26px,4.2vh,40px); }
.nav-name { font-weight:800; font-size:clamp(14px,2.2vh,22px); letter-spacing:1px; }
.nav-name span { display:block; font-size:clamp(8px,1.1vh,11px); letter-spacing:3px; color:var(--gold2); font-weight:500; }
.nav-links { margin-left:auto; display:flex; gap:6px; }
.nav-links a { font-size:clamp(11px,1.6vh,15px); color:var(--dim); padding:8px 14px; border-radius:10px; text-decoration:none; transition:.2s; }
.nav-links a:hover { color:var(--gold); background:rgba(255,215,0,.06); }
.nav-links a.nav-cta { font-weight:700; color:#1a1400; background:linear-gradient(135deg,#FFD700,#c9a227); }
.container { display:flex; flex-direction:column; height:100vh; height:100dvh; padding-top:var(--navH); }
.top-bar { display:flex; justify-content:space-around; padding:1.2vh 2vw; background:rgba(255,255,255,.03); border-bottom:1px solid var(--line); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); font-size:clamp(15px,2.2vh,30px); }
.top-bar > span { color:var(--dim); }
.top-bar > span > span { color:var(--gold); font-weight:bold; }
.table-area { flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; }
.seats-top, .seats-bottom { display:flex; gap:clamp(16px,3vw,64px); justify-content:center; }
.seat { background:var(--panel); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-radius:14px; padding:1.1vh 1.1vw; min-width:clamp(110px,11vw,230px); text-align:center; border:1px solid rgba(255,255,255,.08); }
.seat.active { border-color:var(--gold); box-shadow:0 0 18px rgba(255,215,0,.25); animation:pulse 1s infinite; }
.seat.folded { opacity:0.4; }
.seat.allin { border-color:#ff6b3d; }
.seat.eliminated { opacity:0.25; }
.seat.empty { color:#55555f; }
.seat .nick { font-size:clamp(12px,1.8vh,24px); margin-bottom:0.4vh; }
.seat .d-badge { display:inline-block; background:linear-gradient(135deg,#FFD700,#c9a227); color:#1a1400; border-radius:50%; width:clamp(14px,1.9vh,24px); height:clamp(14px,1.9vh,24px); font-size:clamp(10px,1.2vh,15px); line-height:clamp(14px,1.9vh,24px); margin-left:4px; vertical-align:middle; font-weight:900; }
.seat .chips { font-size:clamp(15px,2.6vh,34px); color:var(--gold); font-weight:bold; }
.seat .bet { font-size:clamp(10px,1.5vh,19px); color:var(--gold2); margin-top:0.2vh; }
.seat .status { font-size:clamp(10px,1.5vh,19px); margin-top:0.4vh; color:var(--dim); }
.seat .reveal { display:flex; gap:0.4vw; justify-content:center; margin-top:0.6vh; }
.mini-card { width:clamp(20px,2.8vh,34px); height:clamp(28px,3.9vh,48px); background:#F5F5F0; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:clamp(11px,1.7vh,20px); font-weight:bold; }
.mini-card.red { color:#E53935; }
.mini-card.black { color:#000; }
.community { display:flex; gap:clamp(6px,1vh,14px); margin:1.8vh 0; justify-content:center; }
.card { width:clamp(40px,7.6vh,92px); height:clamp(56px,10.6vh,130px); background:#F5F5F0; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:clamp(18px,3.4vh,42px); font-weight:bold; box-shadow:0 4px 14px rgba(0,0,0,.35); }
.card.red { color:#E53935; }
.card.black { color:#000; }
.card.back { background:linear-gradient(135deg,#14141f,#262013); border:1px solid rgba(201,162,39,.35); color:#555; box-shadow:none; }
.pot { text-align:center; font-size:clamp(18px,2.8vh,36px); color:var(--gold); font-weight:800; margin:0.9vh 0; }
.bottom-bar { display:flex; justify-content:center; gap:2vw; padding:1.1vh 1.5vw; background:rgba(255,255,255,.03); border-top:1px solid rgba(255,255,255,.06); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
.bottom-bar button { background:rgba(255,255,255,.04); color:var(--gold); border:1px solid var(--line); padding:0.8vh 1.5vw; border-radius:10px; cursor:pointer; font-size:clamp(12px,1.6vh,20px); font-family:inherit; }
.bottom-bar .history { flex:1; min-width:0; text-align:left; align-self:center; }
.bottom-bar .history .h-entry { color:var(--dim); font-size:clamp(10px,1.4vh,17px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bottom-bar #statusText { font-size:clamp(11px,1.5vh,18px); }
.connect-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; height:100dvh; padding-top:var(--navH); }
.cs-logo { width:clamp(72px,12vh,120px); height:clamp(72px,12vh,120px); filter:drop-shadow(0 12px 32px rgba(255,215,0,.3)); }
.cs-title { margin-top:2vh; margin-bottom:4vh; font-size:clamp(28px,5.5vh,54px); font-weight:900; letter-spacing:3px; background:linear-gradient(135deg,#FFE87C,#FFD700 45%,#c9a227); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.cs-sub { color:var(--dim); margin-bottom:2.5vh; font-size:clamp(13px,1.9vh,20px); }
.cs-hint { color:#55555f; margin-top:3vh; font-size:clamp(11px,1.6vh,16px); }
.connect-screen input { font-size:24px; padding:12px; text-align:center; width:200px; background:rgba(255,255,255,.05); color:var(--gold); border:1px solid var(--gold2); border-radius:12px; letter-spacing:4px; font-family:inherit; outline:none; }
.connect-screen button { margin-top:20px; font-size:20px; font-weight:700; padding:12px 40px; background:linear-gradient(135deg,#FFD700,#c9a227); color:#1a1400; border:none; border-radius:12px; cursor:pointer; box-shadow:0 8px 28px rgba(255,215,0,.25); font-family:inherit; }
@keyframes pulse { 0%,100%{border-color:var(--gold);} 50%{border-color:#FFE87C;} }
/* 赢家横幅（细节对齐 tv-display WinnerBanner，样式对齐首页） */
.winner-banner { position:fixed; top:calc(var(--navH) + 1vh); left:50%; transform:translateX(-50%); z-index:50; background:rgba(7,7,12,.85); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid var(--gold); border-radius:12px; padding:1.1vh 2.5vw; color:var(--gold); font-size:clamp(16px,2.8vh,34px); font-weight:bold; white-space:nowrap; box-shadow:0 12px 36px rgba(255,215,0,.2); animation:bannerDrop .3s ease-out; }
@keyframes bannerDrop { from { transform:translate(-50%,-100%); opacity:0; } to { transform:translate(-50%,0); opacity:1; } }
/* 实时排行（细节对齐 tv-display LeaderboardPanel，样式对齐首页毛玻璃面板） */
.leaderboard { position:absolute; right:1vw; top:50%; transform:translateY(-50%); background:var(--panel); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:14px; padding:1.2vh 1vw; min-width:clamp(140px,13vw,280px); z-index:5; }
.leaderboard h4 { color:var(--gold); font-size:clamp(12px,2vh,24px); margin-bottom:0.6vh; text-align:center; }
.lb-row { display:flex; justify-content:space-between; gap:1vw; font-size:clamp(10px,1.6vh,20px); padding:0.4vh 0; }
.lb-row.leader { color:var(--gold); font-weight:bold; }
.lb-row.out { color:#55555f; }
/* 扫码支付开桌（与 leaderboard 同族面板，仅空闲态显示，支付成功赛事激活后自动隐藏） */
.qr-panel { position:absolute; left:1vw; top:50%; transform:translateY(-50%); background:var(--panel); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:14px; padding:1.4vh 1vw; z-index:5; text-align:center; }
.qr-panel h4 { color:var(--gold); font-size:clamp(12px,2vh,24px); margin-bottom:1vh; }
.qr-panel .qr-box { background:#F5F5F0; border-radius:8px; padding:0.9vh; display:inline-block; line-height:0; }
.qr-panel .qr-box img, .qr-panel .qr-box canvas { display:block; }
.qr-panel .qr-price { color:var(--gold); font-size:clamp(14px,2.4vh,30px); font-weight:bold; margin-top:1vh; min-height:1em; }
.qr-panel .qr-hint { color:var(--dim); font-size:clamp(10px,1.5vh,19px); margin-top:0.4vh; }
/* APP 下载二维码（常驻右下角，与 leaderboard/qr-panel 同族面板，低调不抢牌桌） */
.app-dl { position:absolute; right:1vw; bottom:1.5vh; background:var(--panel); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:14px; padding:1vh 0.8vw; z-index:5; text-align:center; opacity:.85; }
.app-dl .dl-box { background:#F5F5F0; border-radius:6px; padding:0.6vh; display:inline-block; line-height:0; }
.app-dl .dl-box img, .app-dl .dl-box canvas { display:block; }
.app-dl .dl-cap { color:var(--dim); font-size:clamp(10px,1.4vh,17px); margin-top:0.5vh; }
/* 赛事结束排名浮层 */
.finished-mask { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:200; }
.finished-box { background:rgba(12,12,18,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--gold); border-radius:20px; padding:3vh 3vw; min-width:clamp(300px,26vw,560px); box-shadow:0 20px 60px rgba(0,0,0,.5); }
.finished-box h2 { color:var(--gold); text-align:center; margin-bottom:1.2vh; font-size:clamp(20px,3.4vh,40px); }
.fr-row { display:flex; justify-content:space-between; gap:2vw; padding:0.5vh 0; font-size:clamp(14px,2.2vh,28px); }
.fr-row.first { color:var(--gold); font-weight:bold; }
.finished-hint { color:#55555f; font-size:clamp(10px,1.4vh,16px); text-align:center; margin-top:1.2vh; }
@media (max-width:900px) and (orientation:portrait) { .leaderboard, .qr-panel, .app-dl { display:none; } .nav-links { display:none; } }
/* 矮视口（手机横屏）紧凑化，风格不变 */
@media (max-height:500px) {
  :root { --navH:34px; }
  .nav-links { display:none; }
  .app-dl { display:none; }
  .top-bar { padding:8px 20px; font-size:15px; }
  .community { margin:8px 0; }
  .card { width:44px; height:62px; font-size:20px; }
  .seat { padding:8px 14px; min-width:100px; }
  .seat .nick { font-size:12px; }
  .seat .chips { font-size:15px; }
  .pot { font-size:18px; margin:6px 0; }
  .bottom-bar { padding:8px 12px; }
  .mini-card { width:22px; height:30px; font-size:11px; }
}
</style>
</head>
<body>
<div class="glow glow-a"></div><div class="glow glow-b"></div><div class="glow glow-c"></div>
<nav><div class="nav-in">
  <img src="/assets/logo.svg" alt="天天扑克锦标赛 Logo">
  <div class="nav-name">天天扑克锦标赛<span>TIANTIAN POKER</span></div>
  <div class="nav-links">
    <a href="/">首页</a>
    <a href="/player.html">网页对战</a>
    <a href="/tv.html">开房间</a>
    <a href="/agent/">Agent 参赛</a>
    <a href="/merchant/login.html">商户后台</a>
    <a class="nav-cta" href="/player.html">立即参赛</a>
  </div>
</div></nav>
<div id="app"></div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/assets/qrcode.min.js"></script>
<script>
const SERVER = window.location.origin;
let socket = null;
let tableCode = '';

// ============ 牌桌状态（交互细节对齐 tv-display App / tv1.html，UI 保持本页风格） ============
const S = {
  seats: [], communityCards: [], pot: 0, currentBet: 0,
  actingIndex: -1, dealerIndex: 0, handNumber: 0, stage: '',
  blindLevel: 1, sb: 10, bb: 20, countdown: 0, phase: '',
  statusText: '等待连接...', handHistory: [],
  winnerBanner: null,      // {winnerName, winAmount, handName}
  showdownHands: {},       // seatIndex → [card, card]
  rankings: [], finished: false,
  launchFee: null,         // 开桌费用（分），来自 /api/v1/tables/:code
  tournamentId: '',        // 当前赛事 id（用于 tournament_cancelled 过滤本桌）
};
let finishedTimer = null;
let qrRendered = false;    // 二维码只生成一次，之后按阶段显隐

// ============ 工具（与 App 同规则） ============
function fmt(n) { n = Math.floor(n || 0); if (n >= 1e6) return Math.floor(n/1e6)+'M'; if (n >= 1e3) return Math.floor(n/1e3)+'K'; return String(n); }
function fmtAmt(n) { n = Math.floor(n || 0); if (n >= 1e6) return Math.floor(n/1e6)+'M'; if (n >= 1e4) return Math.floor(n/1e3)+'K'; return String(n); } // 横幅金额与 App formatAmount 一致
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stageLabel(stage) {
  return { preflop:'翻牌前', flop:'翻牌', turn:'转牌', river:'河牌', showdown:'摊牌' }[String(stage || '').toLowerCase()] || String(stage || '');
}
function buildActionText(action, amount) {
  switch (String(action).toLowerCase()) {
    case 'fold': return '弃牌';
    case 'check': return '过牌';
    case 'call': return amount > 0 ? `跟注 ${amount}` : '跟注';
    case 'raise': return `加注到 ${amount}`;
    case 'bet': return `下注 ${amount}`;
    case 'allin': case 'all-in': case 'all_in': return `全下 ${amount}`;
    case 'small_blind': return `小盲 ${amount}`;
    case 'big_blind': return `大盲 ${amount}`;
    default: return `${action} ${amount}`.trim();
  }
}
function isAllin(st) { st = String(st || '').toLowerCase(); return st === 'allin' || st === 'all-in' || st === 'all_in'; }
function addHistory(text, playerId) {
  const seat = S.seats.find(s => s.playerId === playerId);
  const name = seat && seat.nickname ? seat.nickname : '';
  S.handHistory = [...S.handHistory, name ? `${name}: ${text}` : text].slice(-20);
}

function renderConnect() {
  document.getElementById('app').innerHTML = `
    <div class="connect-screen">
      <img src="/assets/logo.svg" class="cs-logo" alt="Logo"><h1 class="cs-title">天天扑克锦标赛</h1>
      <p class="cs-sub">输入桌号连接牌桌</p>
      <input id="codeInput" maxlength="6" placeholder="SNGT01" value="" />
      <button onclick="connect()">连接</button>
      <p class="cs-hint">一般无需输入：TV 首次启动自动开桌；此处仅用于切换到指定桌号</p>
    </div>
  `;
  document.getElementById('codeInput').focus();
  document.getElementById('codeInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') connect();
  });
}

function connect(code) {
  // 支持零输入自动开桌传入桌号；手动输入场景回退读输入框
  tableCode = String(code || (document.getElementById('codeInput') || {}).value || '').toUpperCase().trim();
  if (!tableCode) return;
  localStorage.setItem('tv_table_code', tableCode);

  // 服务端要求匿名围观连接必须带 role=tv，否则握手被拒绝（表现为"点了没反应"）
  socket = io(SERVER, { path: '/socket.io/', query: { role: 'tv' } });
  socket.on('connect', () => {
    socket.emit('join_table', tableCode);
    if (!document.getElementById('seatsTop')) renderTable();
    fetchTableInfo();
    renderAll();
  });
  socket.on('connect_error', (err) => {
    // 连接失败要看得见，不能静默
    const el = document.querySelector('.connect-screen p');
    if (el) { el.textContent = '连接失败: ' + err.message; el.style.color = '#E53935'; }
  });
  socket.on('disconnect', () => {
    document.getElementById('app').innerHTML = '<div class="connect-screen"><h1 style="color:#ff5252;">已断线，重连中...</h1></div>';
  });

  // 看门狗：连上后 8 秒仍收不到 table_state（桌号已失效/不存在），清记忆重新自动开桌
  setTimeout(() => {
    if (!S.phase && !S.seats.length) {
      localStorage.removeItem('tv_table_code');
      if (socket) { socket.disconnect(); socket = null; }
      autoProvision();
    }
  }, 8000);

  // ============ 事件处理（对齐 tv-display TableViewModel.handleEvent） ============
  socket.on('table_state', (d) => {
    // 入座/重连后的全量状态
    if (d.seats) S.seats = d.seats;
    if (d.sb != null) { S.sb = d.sb; S.bb = d.bb; S.blindLevel = d.blindLevel || 1; }
    if (d.pot != null) S.pot = d.pot;
    if (d.currentBet != null) S.currentBet = d.currentBet;
    if (d.communityCards) S.communityCards = d.communityCards;
    S.actingIndex = d.actingIndex ?? -1;
    S.dealerIndex = d.dealerIndex ?? 0;
    if (d.handNumber != null) S.handNumber = d.handNumber;
    if (d.stage != null) S.stage = d.stage;
    if (d.countdown != null) S.countdown = d.countdown;
    if (d.tournamentId) S.tournamentId = d.tournamentId;
    if (d.phase) {
      S.phase = String(d.phase).toLowerCase();
      S.statusText = S.phase === 'started' ? '比赛进行中' : S.phase === 'registering' ? '报名中，等待开赛...' : '等待赛事开始';
    }
    renderAll();
  });
  socket.on('seat_joined', (d) => {
    // 服务端只发单座字段（seatIndex/nickname/...），不是整桌
    if (d.seatIndex == null || d.seatIndex < 0) return;
    const seat = {
      seatIndex: d.seatIndex, playerId: d.playerId || '', nickname: d.nickname || '',
      avatar: d.avatar || '', status: 'waiting', chipCount: d.chipCount ?? 1000,
      currentBet: 0, lastAction: '',
    };
    const i = S.seats.findIndex(s => s.seatIndex === d.seatIndex);
    if (i >= 0) S.seats[i] = seat; else S.seats.push(seat);
    renderAll();
  });
  socket.on('seat_left', (d) => {
    if (d.seatIndex == null || d.seatIndex < 0) return;
    S.seats = S.seats.map(s => s.seatIndex === d.seatIndex ? { seatIndex: d.seatIndex, status: 'empty' } : s);
    renderAll();
  });
  socket.on('tournament_activated', (d) => { S.phase = 'registering'; S.statusText = '等待玩家入座...'; renderAll(); });
  socket.on('tournament_cancelled', (d) => {
    // 支付超时/人数不足被取消 → 回空闲态，重新显示扫码开桌（多桌场景下只响应本桌赛事）
    if (S.tournamentId && d && d.tournamentId && d.tournamentId !== S.tournamentId) return;
    Object.assign(S, { phase: 'idle', tournamentId: '', seats: [], pot: 0, communityCards: [], stage: '', handNumber: 0, countdown: 0, statusText: '等待赛事开始' });
    renderAll();
  });
  socket.on('countdown_tick', (d) => { S.countdown = d.remaining ?? 0; renderAll(); });
  socket.on('tournament_started', (d) => {
    if (d.seats) S.seats = d.seats;
    S.phase = 'started'; S.countdown = 0; S.statusText = '比赛开始!';
    renderAll();
  });
  socket.on('new_hand', (d) => {
    // 保留公共牌到 hand_started 才清除
    S.stage = 'preflop'; S.actingIndex = -1;
    if (d.handNumber != null) S.handNumber = d.handNumber;
    if (d.dealerIndex != null) S.dealerIndex = d.dealerIndex;
    S.statusText = `第 ${S.handNumber} 手`;
    renderAll();
  });
  socket.on('hand_started', (d) => {
    S.handNumber = d.handNumber ?? S.handNumber;
    S.stage = d.stage || 'preflop';
    S.pot = d.pot ?? 0;
    S.currentBet = d.currentBet ?? 0;
    S.actingIndex = d.actingIndex ?? -1;
    if (d.seats) S.seats = d.seats;
    if (d.dealerIndex != null) S.dealerIndex = d.dealerIndex;
    S.communityCards = [];   // 新一手清公共牌
    S.winnerBanner = null;   // 清上一手赢家横幅
    S.showdownHands = {};    // 清上一手摊牌明牌
    S.statusText = `第 ${S.handNumber} 手 - ${stageLabel(S.stage)}`;
    renderAll();
  });
  socket.on('stage_changed', (d) => {
    S.stage = d.stage || S.stage;
    if (d.communityCards) S.communityCards = d.communityCards;
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? 0;
    S.actingIndex = d.actingIndex ?? -1;
    if (d.seats && d.seats.length) S.seats = d.seats;
    S.statusText = stageLabel(S.stage);
    renderAll();
  });
  socket.on('turn_changed', (d) => {
    S.actingIndex = d.actingIndex ?? -1;
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? S.currentBet;
    if (d.seats && d.seats.length) S.seats = d.seats;
    renderAll();
  });
  socket.on('action_result', (d) => {
    const actionText = buildActionText(d.action, d.amount);
    if (d.seats && d.seats.length) {
      S.seats = d.seats.map(seat => ({
        ...seat,
        lastAction: seat.playerId === d.playerId ? actionText : (seat.lastAction || ''),
      }));
    } else {
      // 服务端没带座位时的本地兜底（与 App 同规则）
      S.seats = S.seats.map(seat => {
        if (seat.playerId !== d.playerId) return seat;
        const a = String(d.action).toLowerCase();
        let chips = seat.chipCount || 0;
        if (a === 'call' || a === 'raise' || a === 'bet') chips -= (d.amount || 0);
        if (isAllin(a)) chips = 0;
        return {
          ...seat,
          lastAction: actionText,
          status: a === 'fold' ? 'folded' : (isAllin(a) ? 'allin' : seat.status),
          chipCount: Math.max(0, chips),
          currentBet: ['raise', 'bet', 'call'].includes(a) ? d.amount : seat.currentBet,
        };
      });
    }
    S.pot = d.pot ?? S.pot;
    S.currentBet = d.currentBet ?? S.currentBet;
    S.actingIndex = d.actingIndex ?? -1;
    addHistory(actionText, d.playerId);
    renderAll();
  });
  socket.on('showdown', (d) => {
    S.stage = 'showdown';
    S.pot = d.pot ?? S.pot;
    if (d.communityCards && d.communityCards.length) S.communityCards = d.communityCards;
    if (d.allResults) {
      const map = {};
      d.allResults.forEach(r => {
        if (r.seatIndex >= 0 && r.holeCards && r.holeCards.length) map[r.seatIndex] = r.holeCards;
      });
      if (Object.keys(map).length) S.showdownHands = map;
    }
    S.statusText = '摊牌';
    renderAll();
  });
  socket.on('hand_result', (d) => {
    if (d.seats && d.seats.length) {
      S.seats = d.seats;
    } else if (d.winnerId) {
      S.seats = S.seats.map(s => s.playerId === d.winnerId ? { ...s, chipCount: (s.chipCount || 0) + (d.pot || 0) } : s);
    }
    const winner = S.seats.find(s => s.playerId === d.winnerId);
    const winnerName = (winner && winner.nickname) || d.winnerId || '';
    S.pot = 0; S.currentBet = 0; S.actingIndex = -1;
    S.winnerBanner = winnerName ? { winnerName, winAmount: d.winAmount ?? d.pot ?? 0, handName: d.handName || '' } : null;
    S.statusText = `第 ${d.handNumber} 手结束 - ${winnerName} 赢得 ${d.pot}`;
    addHistory(`第${d.handNumber}手：${winnerName} 赢得底池 ${d.pot}`);
    renderAll();
  });
  socket.on('player_eliminated', (d) => {
    S.seats = S.seats.map(s => s.playerId === d.playerId ? { ...s, status: 'eliminated' } : s);
    renderAll();
  });
  socket.on('blind_level_up', (d) => {
    S.blindLevel = d.level ?? S.blindLevel;
    S.sb = d.sb ?? S.sb;
    S.bb = d.bb ?? S.bb;
    renderAll();
  });
  socket.on('tournament_finished', (d) => {
    S.rankings = d.rankings || [];
    if (d.seats) S.seats = d.seats;
    S.finished = true;
    S.statusText = '比赛结束';
    renderAll();
    // 5 秒后自动回等待状态（对齐 tv1.html / App FinishedScreen）
    if (finishedTimer) clearTimeout(finishedTimer);
    finishedTimer = setTimeout(() => {
      finishedTimer = null;
      Object.assign(S, {
        finished: false, rankings: [], seats: [], pot: 0, communityCards: [],
        stage: '', handNumber: 0, countdown: 0, winnerBanner: null, showdownHands: {},
        statusText: '等待赛事开始',
      });
      renderAll();
    }, 5000);
  });
}

function renderTable() {
  document.getElementById('app').innerHTML = `
    <div class="container">
      <div class="top-bar">
        <span>桌号: <span id="code">${tableCode}</span></span>
        <span>盲注: <span id="blinds">10/20</span></span>
        <span>级别: <span id="level">1</span></span>
        <span>手牌: <span id="handNo">--</span></span>
        <span>奖池: <span id="pot">0</span></span>
        <span>倒计时: <span id="countdown">--</span></span>
      </div>
      <div class="table-area">
        <div>
          <div class="seats-top" id="seatsTop"></div>
          <div class="community" id="community"></div>
          <div class="pot" id="potDisplay">底池: 0</div>
          <div class="seats-bottom" id="seatsBottom"></div>
        </div>
        <div class="leaderboard" id="leaderboard"></div>
        <div class="qr-panel" id="qrPanel" style="display:none"></div>
        <div class="app-dl" id="appDl"></div>
      </div>
      <div class="bottom-bar">
        <div class="history" id="history"></div>
        <span id="statusText" style="color:#9c9ca8;align-self:center;">等待连接...</span>
        <button onclick="location.reload()">断开</button>
      </div>
    </div>
  `;
}

// ============ 分块渲染（全部由状态 S 驱动） ============
// 部分浏览器（老 Chrome）不认 100dvh，100vh 会被地址栏顶高，用 JS 实测视口高度兜底
function fitViewport() {
  const c = document.querySelector('.container');
  if (c) c.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', fitViewport);

function renderAll() {
  if (!document.getElementById('seatsTop')) return;
  fitViewport();
  renderTopBar();
  renderSeats();
  renderCommunity();
  renderBottom();
  renderBanner();
  renderLeaderboard();
  renderQR();
  renderAppDl();
  renderFinished();
}

// 拉取开桌费用（payment 流程与 /pay/pay.html 同一数据源）
function fetchTableInfo() {
  fetch(`${SERVER}/api/v1/tables/${encodeURIComponent(tableCode)}`)
    .then(r => (r.ok ? r.json() : null))
    .then(d => {
      if (!d) return;
      S.launchFee = d.launch_fee ?? null;
      renderQR();
    })
    .catch(() => {});
}

// APP 下载二维码（常驻右下角）：链接玩家端 APK，扫码即下
const APP_DOWNLOAD_URL = 'https://ttpoker.xyz/download/player-app-v1.1.1.apk';
let dlRendered = false;
function renderAppDl() {
  const el = document.getElementById('appDl');
  if (!el || dlRendered || typeof QRCode === 'undefined') return;
  const size = Math.max(64, Math.round(window.innerHeight * 0.10));
  el.innerHTML = `<div class="dl-box" id="dlBox"></div><div class="dl-cap">扫码下载玩家APP</div>`;
  new QRCode(document.getElementById('dlBox'), {
    text: APP_DOWNLOAD_URL, width: size, height: size,
    colorDark: '#07070c', colorLight: '#F5F5F0',
    correctLevel: QRCode.CorrectLevel.M,
  });
  dlRendered = true;
}

// 扫码支付开桌：仅空闲态（无报名/进行中赛事）显示；支付成功→tournament_activated→自动隐藏
function renderQR() {
  const el = document.getElementById('qrPanel');
  if (!el) return;
  const busy = S.phase === 'registering' || S.phase === 'started' || S.finished;
  if (busy || !tableCode || typeof QRCode === 'undefined') { el.style.display = 'none'; return; }
  if (!qrRendered) {
    const payUrl = `${SERVER}/pay/pay.html?table=${encodeURIComponent(tableCode)}`;
    const size = Math.max(96, Math.round(window.innerHeight * 0.16));
    el.innerHTML = `<h4>扫码开启牌桌</h4>
      <div class="qr-box" id="qrBox"></div>
      <div class="qr-price">${S.launchFee != null ? '¥ ' + (S.launchFee / 100).toFixed(2) : ''}</div>
      <div class="qr-hint">微信 / 支付宝 / USDT</div>`;
    new QRCode(document.getElementById('qrBox'), {
      text: payUrl, width: size, height: size,
      colorDark: '#07070c', colorLight: '#F5F5F0',
      correctLevel: QRCode.CorrectLevel.M,
    });
    qrRendered = true;
  } else if (S.launchFee != null) {
    const p = el.querySelector('.qr-price');
    if (p && !p.textContent) p.textContent = '¥ ' + (S.launchFee / 100).toFixed(2);
  }
  el.style.display = '';
}

function renderTopBar() {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('blinds', `${S.sb}/${S.bb}`);
  set('level', S.blindLevel);
  set('handNo', S.handNumber > 0 ? `#${S.handNumber}` : '--');
  set('pot', S.pot);
  if (S.countdown > 0) {
    const m = Math.floor(S.countdown / 60);
    const s = S.countdown % 60;
    set('countdown', `${m}:${String(s).padStart(2, '0')}`);
  } else {
    set('countdown', '--');
  }
}

function renderSeats() {
  const seatsTop = document.getElementById('seatsTop');
  const seatsBottom = document.getElementById('seatsBottom');
  if (!seatsTop) return;

  const seats = [];
  for (let i = 0; i < 6; i++) {
    const p = S.seats.find(x => x.seatIndex === i);
    seats.push(p || { seatIndex: i, nickname: '空座', chipCount: 0, status: 'empty' });
  }

  seatsTop.innerHTML = seats.slice(0, 3).map(s => seatHTML(s, true)).join('');
  seatsBottom.innerHTML = seats.slice(3, 6).reverse().map(s => seatHTML(s, false)).join('');
}

function seatHTML(s, topRow) {
  const st = String(s.status || '').toLowerCase();
  let cls = 'seat';
  if (st === 'folded') cls += ' folded';
  if (isAllin(st)) cls += ' allin';
  if (st === 'eliminated') cls += ' eliminated';
  if (st === 'empty') cls += ' empty';
  if (s.seatIndex === S.actingIndex && st !== 'empty') cls += ' active';
  const statusText = s.lastAction
    || { waiting:'等待', playing:'坐席中', folded:'弃牌', allin:'All-In', eliminated:'淘汰', empty:'空座' }[st]
    || st;
  // 摊牌明牌：翻向桌心（上排朝下/下排朝上），与 App SeatWithReveal 一致
  const reveal = S.showdownHands[s.seatIndex];
  const revealHTML = (reveal && reveal.length)
    ? `<div class="reveal">${reveal.slice(0, 2).map(c => {
        const red = c.suit === '♥' || c.suit === '♦';
        return `<div class="mini-card ${red ? 'red' : 'black'}">${esc(c.rank)}${esc(c.suit)}</div>`;
      }).join('')}</div>`
    : '';
  return `<div class="${cls}" id="seat-${s.seatIndex}">
    ${!topRow ? revealHTML : ''}
    <div class="nick">${esc(s.nickname || '空座')}${s.seatIndex === S.dealerIndex && st !== 'empty' ? '<span class="d-badge">D</span>' : ''}</div>
    <div class="chips">${s.chipCount || 0}</div>
    ${s.currentBet > 0 ? `<div class="bet">下注 ${s.currentBet}</div>` : ''}
    <div class="status">${esc(statusText)}</div>
    ${topRow ? revealHTML : ''}
  </div>`;
}

function renderCommunity() {
  const el = document.getElementById('community');
  if (!el) return;
  // 固定 5 个卡位，未发的显示卡背（与 App 一致）
  let html = '';
  for (let i = 0; i < 5; i++) {
    const c = S.communityCards[i];
    if (c) {
      const red = c.suit === '♥' || c.suit === '♦';
      html += `<div class="card ${red ? 'red' : 'black'}">${esc(c.rank)}${esc(c.suit)}</div>`;
    } else {
      html += '<div class="card back"></div>';
    }
  }
  el.innerHTML = html;
  const potEl = document.getElementById('potDisplay');
  if (potEl) potEl.textContent = `底池: ${S.pot}`;
}

function renderBottom() {
  const st = document.getElementById('statusText');
  if (st) st.textContent = S.statusText;
  const h = document.getElementById('history');
  if (h) h.innerHTML = S.handHistory.slice(-2).reverse().map(x => `<div class="h-entry">${esc(x)}</div>`).join('');
}

function renderBanner() {
  let el = document.getElementById('winnerBanner');
  if (!S.winnerBanner) { if (el) el.remove(); return; }
  if (!el) {
    el = document.createElement('div');
    el.id = 'winnerBanner';
    el.className = 'winner-banner';
    document.body.appendChild(el);
  }
  const b = S.winnerBanner;
  el.textContent = `🎉 ${b.winnerName} 赢得 ${fmtAmt(b.winAmount)}${b.handName ? ' · ' + b.handName : ''}`;
}

// 实时排行：与 tv-display LeaderboardPanel 排序/字段保持一致（改动需两边同步）
function renderLeaderboard() {
  const el = document.getElementById('leaderboard');
  if (!el) return;
  const ranked = S.seats
    .filter(p => p.status !== 'empty')
    .sort((a, b) => {
      const ae = a.status === 'eliminated' ? 1 : 0;
      const be = b.status === 'eliminated' ? 1 : 0;
      if (ae !== be) return ae - be;
      if ((b.chipCount || 0) !== (a.chipCount || 0)) return (b.chipCount || 0) - (a.chipCount || 0);
      return a.seatIndex - b.seatIndex;
    });
  if (!ranked.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<h4>实时排行</h4>' + ranked.map((p, i) => {
    const out = p.status === 'eliminated';
    const leader = i === 0 && !out;
    return `<div class="lb-row ${out ? 'out' : ''} ${leader ? 'leader' : ''}">
      <span>${leader ? '🥇 ' : ''}#${i + 1} ${esc(p.nickname || '')}</span>
      <span>${out ? '淘汰' : (p.chipCount ?? 0)}</span>
    </div>`;
  }).join('');
}

function renderFinished() {
  let mask = document.getElementById('finishedMask');
  if (!S.finished) { if (mask) mask.remove(); return; }
  const medals = ['🥇', '🥈', '🥉'];
  const rows = (S.rankings || []).map((r, i) => `
    <div class="fr-row ${i === 0 ? 'first' : ''}">
      <span>${medals[i] || (i + 1) + '.'} ${esc(r.nickname || 'Player ' + (i + 1))}</span>
      <span>${fmt(Number(r.chips ?? r.finalChips ?? 0))}</span>
    </div>`).join('');
  const html = `<div class="finished-mask" id="finishedMask"><div class="finished-box">
    <h2>🏆 比赛结束</h2>${rows}
    <div class="finished-hint">5 秒后自动返回…</div>
  </div></div>`;
  if (mask) mask.outerHTML = html; else document.body.insertAdjacentHTML('beforeend', html);
}

// ============ 启动：零输入开桌 ============
// 优先级：URL ?table= > 本地记忆桌号 > 服务端自动开桌；?manual=1 强制手动输入
function autoProvision() {
  document.getElementById('app').innerHTML = `
    <div class="connect-screen">
      <img src="/assets/logo.svg" class="cs-logo" alt="Logo"><h1 class="cs-title">天天扑克锦标赛</h1>
      <p class="cs-sub">正在开启牌桌…</p>
    </div>`;
  fetch(`${SERVER}/api/v1/tables`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
    .then(r => { if (!r.ok) throw new Error('自动开桌失败 (' + r.status + ')'); return r.json(); })
    .then(t => { connect(t.code); })
    .catch(e => {
      renderConnect();
      const el = document.querySelector('.connect-screen p');
      if (el) { el.textContent = e.message + '，请手动输入桌号'; el.style.color = '#E53935'; }
    });
}

(function boot() {
  const q = new URLSearchParams(location.search);
  if (q.get('manual')) { renderConnect(); return; }
  const urlTable = (q.get('table') || '').toUpperCase().trim();
  if (urlTable) { connect(urlTable); return; }
  const saved = localStorage.getItem('tv_table_code');
  if (saved) { connect(saved); return; }
  autoProvision();
})();
</script>
