# 天天扑克锦标赛 — poker.clawclaw.tech
# 部署位置：美国边缘节点 43.166.240.93
#   /www/server/panel/vhost/nginx/poker.clawclaw.tech.conf
# 架构：公网入口在美国服务器，后端经 SSH 隧道（poker-tunnel.service）
#   转发到首尔 43.164.130.145 的 3000-3003 端口
# 证书：acme.sh webroot 模式签发，自动续期

# HTTP：ACME 续期 + 强制跳转 HTTPS
server {
    listen 80;
    server_name poker.clawclaw.tech;
    root /www/wwwroot/poker.clawclaw.tech;

    location ~ ^/\.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    http2 on;
    server_name poker.clawclaw.tech;

    ssl_certificate     /root/.acme.sh/poker.clawclaw.tech_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/poker.clawclaw.tech_ecc/poker.clawclaw.tech.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /www/wwwlogs/poker.clawclaw.tech-access.log;
    error_log /www/wwwlogs/poker.clawclaw.tech-error.log;

    # API（poker-api）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Socket.IO（poker-socket，WebSocket）
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # 商户后台（merchant-api，含静态页面）
    location /merchant/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 支付页 + 支付回调（payment-svc）
    location /pay/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 落地页 / 下载页
    location / {
        root /www/wwwroot/poker.clawclaw.tech;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
