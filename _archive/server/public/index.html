<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Night - 酒吧德州扑克</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #0a0a1e 0%, #1a1a3e 50%, #0d0d2b 100%);
  color: white;
  min-height: 100vh;
}
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="90" font-size="90">🃏</text></svg>') no-repeat right top / 80px;
}
.hero h1 { font-size: 48px; margin-bottom: 10px; }
.hero h1 span { color: #ffd700; }
.hero p { color: #888; font-size: 18px; max-width: 500px; margin: 0 auto; }

.features {
  display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;
  padding: 40px 20px; max-width: 900px; margin: 0 auto;
}
.feature {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 30px; text-align: center;
  width: 240px; backdrop-filter: blur(10px);
}
.feature .icon { font-size: 40px; margin-bottom: 12px; }
.feature h3 { margin-bottom: 8px; font-size: 18px; }
.feature p { color: #888; font-size: 14px; line-height: 1.5; }

.play-section {
  text-align: center; padding: 40px 20px;
}
.play-section h2 { font-size: 28px; margin-bottom: 20px; }
.table-code-input {
  display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.table-code-input input {
  padding: 14px 20px; font-size: 24px; text-align: center; letter-spacing: 8px;
  background: rgba(255,255,255,0.08); border: 2px solid rgba(255,215,0,0.3);
  border-radius: 12px; color: white; width: 220px; outline: none;
  text-transform: uppercase;
}
.table-code-input input:focus { border-color: #ffd700; }
.table-code-input button {
  padding: 14px 32px; font-size: 18px; font-weight: bold;
  background: linear-gradient(135deg, #e94560, #c0392b);
  border: none; border-radius: 12px; color: white; cursor: pointer;
}
.table-code-input button:hover { opacity: 0.9; }

.qr-row {
  display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
  margin: 40px 0;
}
.qr-card {
  background: white; padding: 15px; border-radius: 16px;
  width: 180px;
}
.qr-card img { width: 150px; height: 150px; }
.qr-card .label { color: #333; font-size: 14px; margin-top: 8px; text-align: center; }

.demo-links {
  display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
  padding: 20px;
}
.demo-links a {
  padding: 12px 24px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
  color: white; text-decoration: none; font-size: 16px;
  transition: all 0.2s;
}
.demo-links a:hover { background: rgba(255,255,255,0.12); border-color: #ffd700; }

.footer {
  text-align: center; color: #555; font-size: 13px;
  padding: 40px 20px;
}
</style>
</head>
<body>
<div class="hero">
  <h1>🃏 Poker <span>Night</span></h1>
  <p>酒吧德州扑克 — 扫码入桌，电视大屏显示</p>
</div>

<div class="features">
  <div class="feature">
    <div class="icon">📱</div>
    <h3>扫码入桌</h3>
    <p>玩家手机扫码即可加入牌桌，无需下载 APP</p>
  </div>
  <div class="feature">
    <div class="icon">📺</div>
    <h3>电视大屏</h3>
    <p>公共牌、底池、玩家筹码一目了然</p>
  </div>
  <div class="feature">
    <div class="icon">⚡</div>
    <h3>即时对战</h3>
    <p>WebSocket 实时同步，低延迟体验</p>
  </div>
  <div class="feature">
    <div class="icon">🔐</div>
    <h3>邮箱注册</h3>
    <p>邮箱验证码登录，简易快捷</p>
  </div>
</div>

<div class="play-section">
  <h2>🎮 进入牌桌</h2>
  <div class="table-code-input">
    <input type="text" id="tableCode" placeholder="桌号" maxlength="6" style="text-transform:uppercase">
    <button onclick="joinTable()">进入</button>
  </div>

  <div class="qr-row" id="qrCodes" style="display:none;">
    <div class="qr-card" id="playerQR">
      <img id="qrPlayer" src="" alt="玩家端二维码">
      <div class="label">📱 玩家端</div>
    </div>
    <div class="qr-card" id="tvQR">
      <img id="qrTV" src="" alt="电视端二维码">
      <div class="label">📺 电视端</div>
    </div>
  </div>

  <div class="demo-links">
    <a href="/tv/DEMO" target="_blank">📺 电视演示 (DEMO)</a>
    <a href="/player/DEMO" target="_blank">📱 玩家演示 (DEMO)</a>
  </div>
</div>

<div class="footer">
  <p>Poker Night 🃏 酒吧场景 | 首尔服务器 56ms</p>
  <p style="margin-top:4px;">Powered by QClaw Pool · © 2026</p>
</div>

<script>
function joinTable() {
  const code = document.getElementById('tableCode').value.trim().toUpperCase();
  if (!code) return;
  
  document.getElementById('qrCodes').style.display = 'flex';
  
  const baseUrl = window.location.origin;
  const playerUrl = baseUrl + '/player/' + code;
  const tvUrl = baseUrl + '/tv/' + code;
  
  document.getElementById('qrPlayer').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(playerUrl);
  document.getElementById('qrTV').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(tvUrl);
}

// 自动显示预先创建的牌桌二维码
window.onload = function() {
  document.getElementById('tableCode').value = 'C8BBGS';
  joinTable();
};
</script>
</body>
</html>
