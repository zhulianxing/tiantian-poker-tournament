<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker Night - 玩家端</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Arial', sans-serif; 
  background: linear-gradient(180deg, #0a0a1e, #1a1a3e);
  color: white; 
  min-height: 100vh;
}

/* 登录/注册 */
.auth-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 20px;
}
.auth-screen .logo { font-size: 48px; margin-bottom: 10px; }
.auth-screen h1 { font-size: 28px; margin-bottom: 30px; color: #ffd700; }
.auth-input {
  width: 100%; max-width: 320px; padding: 14px; margin-bottom: 12px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: white; font-size: 16px; outline: none;
}
.auth-input:focus { border-color: #ffd700; }
.auth-btn {
  width: 100%; max-width: 320px; padding: 14px; margin-top: 8px;
  background: linear-gradient(135deg, #e94560, #c0392b); border: none;
  border-radius: 12px; color: white; font-size: 18px; font-weight: bold;
  cursor: pointer; transition: transform 0.2s;
}
.auth-btn:active { transform: scale(0.97); }
.auth-btn:disabled { opacity: 0.5; }
.auth-btn.secondary { background: linear-gradient(135deg, #2d3436, #636e72); }
.hint { color: #888; font-size: 14px; margin-top: 10px; }
.error { color: #e74c3c; margin-top: 8px; font-size: 14px; }

/* 游戏界面 - 隐藏初始 */
.game-screen { display: none; min-height: 100vh; padding: 10px; }

/* 顶部状态 */
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px; margin-bottom: 8px;
}
.top-bar .table-name { font-size: 18px; font-weight: bold; }
.top-bar .chips { font-size: 20px; color: #ffd700; }

/* 公共牌区 */
community-section { text-align: center; margin: 10px 0; }
.community-cards {
  display: flex; justify-content: center; gap: 6px; margin: 8px 0;
}
.card {
  width: 58px; height: 85px; background: white; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: bold; color: #333;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.card.dealt { animation: deal 0.4s ease-out; }
.card.empty { background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.15); }
.card.red { color: #e74c3c; }
.card.hole { width: 65px; height: 95px; font-size: 26px; }
@keyframes deal {
  from { transform: translateY(-60px) rotate(-15deg); opacity: 0; }
  to { transform: translateY(0) rotate(0); opacity: 1; }
}

/* 底池 */
.pot-bar {
  text-align: center; font-size: 22px; color: #ffd700;
  padding: 8px; background: rgba(255,215,0,0.08);
  border-radius: 8px; margin: 8px 0;
}

/* 底牌区 */
.hole-cards {
  display: flex; justify-content: center; gap: 8px; margin: 12px 0;
}
.hole-cards .label { 
  position: absolute; margin-top: -25px; font-size: 12px; color: #888;
  width: 100%; text-align: center;
}
.hole-area { position: relative; display: inline-block; }

/* 玩家列表 - 其他人 */
.opponents { margin: 10px 0; }
.opponent {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.04); border-radius: 10px;
  border: 1px solid transparent; transition: all 0.3s;
}
.opponent.current-turn { border-color: #2ecc71; background: rgba(46,204,113,0.08); }
.opponent.folded { opacity: 0.3; }
.opponent.allin { border-color: #e74c3c; }
.opponent .name { font-size: 15px; }
.opponent .info { text-align: right; }
.opponent .chips { font-size: 16px; color: #ffd700; }
.opponent .bet { font-size: 13px; color: #f39c12; }
.opponent .action-text { font-size: 12px; color: #2ecc71; }

/* 行动按钮 */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px 20px;
  background: linear-gradient(0deg, #0a0a1e 60%, transparent);
  display: flex; gap: 8px; flex-wrap: wrap;
}
.action-btn {
  flex: 1; min-width: 60px; padding: 14px 8px;
  border: none; border-radius: 10px; font-size: 15px; font-weight: bold;
  cursor: pointer; transition: transform 0.15s;
  color: white;
}
.action-btn:active { transform: scale(0.95); }
.action-btn:disabled { opacity: 0.3; }
.btn-fold { background: #636e72; }
.btn-check { background: #0984e3; }
.btn-call { background: #00b894; }
.btn-raise { background: #e17055; }
.btn-allin { background: #d63031; }
.raise-control {
  display: flex; align-items: center; gap: 8px; width: 100%; margin-bottom: 8px;
}
.raise-control input {
  flex: 1; padding: 10px; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
  color: white; font-size: 16px; text-align: center;
}
.raise-presets { display: flex; gap: 6px; }
.raise-presets button {
  padding: 6px 12px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
  color: white; font-size: 13px; cursor: pointer;
}
.raise-presets button:active { background: rgba(255,255,255,0.2); }

/* 盲注/级别信息 */
.blind-info {
  text-align: center; color: #888; font-size: 13px; margin: 4px 0;
}

/* 行动记录 */
.action-log {
  margin: 8px 0; padding: 8px; background: rgba(0,0,0,0.2);
  border-radius: 8px; max-height: 60px; overflow-y: auto;
  font-size: 13px; color: #aaa;
}
.action-log .entry { margin: 2px 0; }

/* 等待状态 */
.waiting-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh;
  color: #888; font-size: 18px;
}
.waiting-screen .big { font-size: 48px; margin-bottom: 15px; }
.waiting-screen .qr-hint { font-size: 14px; margin-top: 20px; color: #666; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
  border-radius: 10px; font-size: 16px; z-index: 999;
  animation: fadeInOut 2s ease-out forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
}
.toast.success { border-left: 4px solid #00b894; }
.toast.error { border-left: 4px solid #e74c3c; }
</style>
</head>
<body>
<!-- 登录界面 -->
<div class="auth-screen" id="authScreen">
  <div class="logo">🃏</div>
  <h1>Poker Night</h1>
  <input class="auth-input" id="emailInput" type="email" placeholder="邮箱地址" autocomplete="email">
  <div style="display:flex; gap:8px; max-width:320px; width:100%;">
    <input class="auth-input" id="codeInput" type="text" placeholder="验证码" style="flex:1;">
    <button class="auth-btn secondary" id="sendCodeBtn" style="flex:0 0 auto; padding:14px 16px; font-size:14px; width:auto;" onclick="sendCode()">发送</button>
  </div>
  <input class="auth-input" id="nicknameInput" type="text" placeholder="昵称（选填）" autocomplete="off">
  <button class="auth-btn" id="loginBtn" onclick="login()">🎮 进入牌桌</button>
  <div class="error" id="authError"></div>
  <div class="hint" id="codeHint">输入邮箱 → 获取验证码 → 进入牌桌</div>
</div>

<!-- 游戏界面 -->
<div class="game-screen" id="gameScreen">
  <div class="top-bar">
    <span class="table-name" id="tableName">🃏 牌桌</span>
    <span class="chips" id="myChips">💰 0</span>
  </div>
  <div class="blind-info" id="blindInfo">盲注 10/20 · Lv 1</div>

  <!-- 等待 -->
  <div class="waiting-screen" id="waitingScreen" style="display:none;">
    <div class="big">🍺</div>
    <div>等待发牌...</div>
    <div class="qr-hint">当前玩家: <span id="playerCount">0</span>/6</div>
  </div>

  <!-- 游戏进行中 -->
  <div id="gameActive" style="display:none;">
    <!-- 底牌 -->
    <div style="text-align:center; font-size:13px; color:#888; margin-top:4px;">你的底牌</div>
    <div class="hole-cards">
      <div class="hole-area">
        <div class="card hole empty" id="hole1">&nbsp;</div>
      </div>
      <div class="hole-area">
        <div class="card hole empty" id="hole2">&nbsp;</div>
      </div>
    </div>

    <!-- 公共牌 -->
    <div style="text-align:center; font-size:12px; color:#666; margin-top:4px;">公共牌</div>
    <div style="text-align:center;">
      <div class="community-cards" id="communityCards" style="display:inline-flex;">
        <div class="card empty"></div>
        <div class="card empty"></div>
        <div class="card empty"></div>
        <div class="card empty"></div>
        <div class="card empty"></div>
      </div>
    </div>

    <!-- 底池 -->
    <div class="pot-bar">🪙 底池: <span id="potDisplay">0</span></div>

    <!-- 对手列表 -->
    <div class="opponents" id="opponentList"></div>

    <!-- 行动记录 -->
    <div class="action-log" id="actionLog" style="margin-bottom:100px;">
      <div class="entry" style="color:#666;">等待第一手牌...</div>
    </div>
  </div>

  <!-- 行动按钮 (Fixed bottom) -->
  <div class="action-bar" id="actionBar" style="display:none;">
    <div class="raise-control" id="raiseControl" style="display:none;">
      <div class="raise-presets">
        <button onclick="setRaise('min')">最小</button>
        <button onclick="setRaise('3bb')">3BB</button>
        <button onclick="setRaise('half')">½底池</button>
        <button onclick="setRaise('pot')">全底池</button>
      </div>
      <input type="number" id="raiseAmount" placeholder="下注额" min="0">
    </div>
    <div style="display:flex; gap:8px; width:100%;">
      <button class="action-btn btn-fold" onclick="doAction('fold')">弃牌</button>
      <button class="action-btn btn-check" id="checkBtn" onclick="doAction('check')">过牌</button>
      <button class="action-btn btn-call" id="callBtn" onclick="doAction('call')" style="display:none;">跟注</button>
      <button class="action-btn btn-raise" id="raiseBtn" onclick="toggleRaise()">加注</button>
      <button class="action-btn btn-allin" id="allinBtn" onclick="doAction('allin')">ALL-IN</button>
    </div>
  </div>
</div>

<script>
// --- 状态 ---
let socket;
let playerId = null;
let tableCode = new URLSearchParams(location.search).get('code') || 'DEMO';
let playerEmail = '';
let currentHand = [];
let communityCardsState = [];
let myChips = 2000;
let currentBetAmount = 0;
let isMyTurn = false;
let callAmount = 0;
let minRaise = 20;
let players = [];

// 初始化：尝试从本地存储恢复 session
const savedPlayer = localStorage.getItem('poker_player');
if (savedPlayer) {
  const p = JSON.parse(savedPlayer);
  document.getElementById('emailInput').value = p.email || '';
  document.getElementById('nicknameInput').value = p.nickname || '';
}

document.getElementById('tableName').textContent = '🃏 桌 ' + tableCode;

// --- Auth ---
async function sendCode() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('authError').textContent = '请输入有效邮箱';
    return;
  }
  document.getElementById('sendCodeBtn').disabled = true;
  document.getElementById('sendCodeBtn').textContent = '发送中...';
  document.getElementById('authError').textContent = '';
  document.getElementById('codeHint').textContent = '发送中，请稍候...';

  try {
    const res = await fetch('/api/auth/send-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('codeHint').textContent = '验证码已发送到 ' + email;
      document.getElementById('authError').style.color = '#2ecc71';
      document.getElementById('authError').textContent = '✅ 验证码已发送';
    } else {
      document.getElementById('authError').textContent = data.message || '发送失败';
    }
  } catch (e) {
    document.getElementById('authError').textContent = '网络错误，请重试';
  }
  document.getElementById('sendCodeBtn').disabled = false;
  document.getElementById('sendCodeBtn').textContent = '发送';
}

async function login() {
  const email = document.getElementById('emailInput').value.trim();
  const code = document.getElementById('codeInput').value.trim();
  const nickname = document.getElementById('nicknameInput').value.trim() || email.split('@')[0];

  if (!email || !code) {
    document.getElementById('authError').textContent = '请输入邮箱和验证码';
    return;
  }

  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = '登录中...';

  try {
    const res = await fetch('/api/auth/verify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code, nickname })
    });
    const data = await res.json();

    if (data.ok) {
      playerId = data.player.id;
      playerEmail = email;
      myChips = data.player.chipBalance;
      
      // 保存到本地
      localStorage.setItem('poker_player', JSON.stringify({
        email, nickname: data.player.nickname, playerId
      }));

      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      
      connectSocket(tableCode, playerId, data.player.nickname);
    } else {
      document.getElementById('authError').textContent = data.message || '登录失败';
    }
  } catch (e) {
    document.getElementById('authError').textContent = '网络错误: ' + e.message;
  }
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = '🎮 进入牌桌';
}

// --- Socket ---
function connectSocket(code, pid, nickname) {
  socket = io(window.location.origin, {
    query: { role: 'player', tableCode: code }
  });

  socket.on('connect', () => {
    showToast('已连接', 'success');
    socket.emit('join_table', { tableCode: code, playerId: pid, nickname });
  });

  socket.on('table_joined', (data) => {
    console.log('Joined table:', data);
    if (data.yourHand && data.yourHand.length > 0) {
      currentHand = data.yourHand;
      renderHoleCards(data.yourHand);
    }
    document.getElementById('waitingScreen').style.display = 'none';

    // 更新玩家数
    const players = data.tableState.players || [];
    document.getElementById('playerCount').textContent = players.length;
    document.getElementById('myChips').textContent = '💰 ' + (myChips || 2000);
  });

  socket.on('your_hand', (data) => {
    currentHand = data.cards;
    renderHoleCards(data.cards);
    document.getElementById('waitingScreen').style.display = 'none';
    document.getElementById('gameActive').style.display = 'block';
  });

  socket.on('table_state', (state) => {
    updateTable(state);
  });

  socket.on('community_cards', (data) => {
    communityCardsState = data.cards || [];
    renderCommunityCards(data.cards);
  });

  socket.on('player_action', (data) => {
    addActionLog(data.nickname, data.action, data.amount);
  });

  socket.on('hand_won', (data) => {
    showToast(`🏆 ${data.winner.nickname} 赢得 ${data.pot}!`, 'success');
    addActionLog(data.winner.nickname, '赢', data.pot);
  });

  socket.on('showdown', (data) => {
    showToast('摊牌!', 'success');
  });

  socket.on('game_over', (data) => {
    showToast(`👑 冠军: ${data.winner.nickname}!`, 'success');
    document.getElementById('actionBar').style.display = 'none';
  });
}

// --- UI 更新 ---
function updateTable(state) {
  players = state.players || [];
  
  // 更新我的筹码
  const me = players.find(p => p.id === playerId);
  if (me) myChips = me.chips;
  document.getElementById('myChips').textContent = '💰 ' + (myChips || 0);
  
  document.getElementById('potDisplay').textContent = state.pot || 0;
  
  const blinds = state.blinds || {};
  document.getElementById('blindInfo').textContent = 
    `盲注 ${blinds.sb || 10}/${blinds.bb || 20} · Lv ${blinds.level || 1}`;

  // 公共牌
  if (state.communityCards && state.communityCards.length > 0) {
    renderCommunityCards(state.communityCards);
  }

  // 对手列表
  renderOpponents(state);

  // 轮到我？
  isMyTurn = state.currentTurn === playerId;
  callAmount = (state.currentBet || 0) - (me ? me.bet || 0 : 0);
  minRaise = state.minRaise || state.blinds?.bb || 20;

  if (isMyTurn && state.status === 'playing') {
    document.getElementById('actionBar').style.display = 'flex';
    updateActionButtons();
  } else {
    document.getElementById('actionBar').style.display = 'none';
  }

  document.getElementById('playerCount').textContent = players.length;
}

function renderHoleCards(cards) {
  const hole1 = document.getElementById('hole1');
  const hole2 = document.getElementById('hole2');
  
  if (cards && cards.length >= 2) {
    hole1.textContent = cards[0];
    hole1.className = 'card hole dealt ' + (isRed(cards[0]) ? 'red' : 'black');
    hole2.textContent = cards[1];
    hole2.className = 'card hole dealt ' + (isRed(cards[1]) ? 'red' : 'black');
  } else {
    hole1.innerHTML = '&nbsp;';
    hole1.className = 'card hole empty';
    hole2.innerHTML = '&nbsp;';
    hole2.className = 'card hole empty';
  }
}

function renderCommunityCards(cards) {
  const divs = document.querySelectorAll('#communityCards .card');
  divs.forEach((div, i) => {
    if (i < cards.length) {
      div.textContent = cards[i];
      div.className = 'card dealt ' + (isRed(cards[i]) ? 'red' : 'black');
    } else {
      div.innerHTML = '&nbsp;';
      div.className = 'card empty';
    }
  });
}

function renderOpponents(state) {
  const container = document.getElementById('opponentList');
  const others = (state.players || []).filter(p => p.id !== playerId);
  
  container.innerHTML = others.map(p => {
    const isActive = state.currentTurn === p.id;
    const isFolded = p.folded;
    const isAllIn = p.isAllIn;
    let cls = 'opponent';
    if (isActive) cls += ' current-turn';
    if (isFolded) cls += ' folded';
    if (isAllIn) cls += ' allin';

    return `
      <div class="${cls}">
        <div>
          <div class="name">${p.nickname || '玩家'}</div>
        </div>
        <div class="info">
          <div class="chips">💰 ${p.chips}</div>
          ${p.bet > 0 ? `<div class="bet">下注 ${p.bet}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function updateActionButtons() {
  const checkBtn = document.getElementById('checkBtn');
  const callBtn = document.getElementById('callBtn');
  
  if (callAmount === 0) {
    checkBtn.style.display = 'block';
    callBtn.style.display = 'none';
  } else {
    checkBtn.style.display = 'none';
    callBtn.style.display = 'block';
    callBtn.textContent = `跟注 ${callAmount}`;
  }
  
  // 更新加注按钮显示
  const raiseBtn = document.getElementById('raiseBtn');
  const minTotal = currentBetAmount > 0 ? currentBetAmount + minRaise : Math.min(minRaise * 2, myChips);
  raiseBtn.textContent = currentBetAmount > 0 ? '加注' : '下注';
  
  document.getElementById('allinBtn').textContent = `ALL-IN ${myChips}`;
  document.getElementById('raiseAmount').placeholder = `最小 ${Math.max(minRaise, callAmount + minRaise)}`;
  document.getElementById('raiseAmount').max = myChips;
}

function toggleRaise() {
  const ctrl = document.getElementById('raiseControl');
  ctrl.style.display = ctrl.style.display === 'none' ? 'flex' : 'none';
}

function setRaise(type) {
  const input = document.getElementById('raiseAmount');
  const pot = parseInt(document.getElementById('potDisplay').textContent) || 0;
  switch(type) {
    case 'min': 
      input.value = Math.max(minRaise, callAmount + minRaise);
      break;
    case '3bb':
      const bb = (parseInt(document.getElementById('blindInfo').textContent.match(/\d+/g)?.[1]) || 20) * 3;
      input.value = Math.min(bb, myChips);
      break;
    case 'half':
      input.value = Math.min(Math.floor(pot / 2), myChips);
      break;
    case 'pot':
      input.value = Math.min(pot, myChips);
      break;
  }
}

function doAction(action) {
  let amount = 0;
  
  if (action === 'raise' || action === 'bet') {
    const input = document.getElementById('raiseAmount');
    amount = parseInt(input.value) || 0;
    if (amount <= 0) { showToast('请输入下注金额', 'error'); return; }
    if (amount > myChips) { showToast('筹码不足', 'error'); return; }
    action = currentBetAmount > 0 ? 'raise' : 'bet';
    document.getElementById('raiseControl').style.display = 'none';
  }

  socket.emit('player_action', { action, amount });
  document.getElementById('actionBar').style.display = 'none';
}

function addActionLog(nickname, action, amount) {
  const log = document.getElementById('actionLog');
  const actions = {
    fold: '弃牌 🙅', check: '过牌 ✅', call: '跟注 ✅',
    raise: '加注 ⬆️', bet: '下注 ⬆️', allin: 'All-In 🔥',
    赢: '赢得'
  };
  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.textContent = `${nickname}: ${actions[action] || action}${amount ? ' '+amount : ''}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  
  // 保留最近10条
  while (log.children.length > 10) {
    log.removeChild(log.firstChild);
  }
}

function isRed(code) {
  return code && (code.includes('♥') || code.includes('♦'));
}

function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || '');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// 调试：支持没有验证码直接进入（开发模式）
document.addEventListener('keydown', (e) => {
  if (e.key === 'F2') {
    document.getElementById('codeInput').value = '123456';
    login();
  }
});
</script>
