<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker Night - TV Display</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Arial', sans-serif; 
  background: linear-gradient(135deg, #0a0a1e, #1a1a3e);
  color: white; 
  overflow: hidden;
  height: 100vh;
}
.tv-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 20px;
}

/* 顶部 - 牌桌信息 */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  margin-bottom: 15px;
}
.header .title { font-size: 28px; font-weight: bold; color: #ffd700; }
.header .table-code { font-size: 18px; color: #aaa; }
.header .hand-count { font-size: 18px; color: #888; }

/* 中间 - 公共牌区域 */
.community-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  border-radius: 20px;
  margin-bottom: 15px;
  position: relative;
}
.pot-display {
  font-size: 36px;
  color: #ffd700;
  margin-bottom: 15px;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.community-cards {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.card {
  width: 100px;
  height: 145px;
  background: white;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: bold;
  color: #333;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: transform 0.3s;
}
.card.dealt { animation: deal 0.5s ease-out; }
.card.empty { background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.2); }
.card.red { color: #e74c3c; }
@keyframes deal {
  from { transform: translateY(-100px) rotate(-10deg); opacity: 0; }
  to { transform: translateY(0) rotate(0); opacity: 1; }
}

/* 底池/盲注/行动提示区域 */
.game-info {
  display: flex;
  gap: 30px;
  align-items: center;
  font-size: 22px;
}
.game-info .blind { color: #f39c12; }
.game-info .level { color: #888; }
.action-prompt {
  font-size: 28px;
  color: #2ecc71;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* 底部 - 玩家座次 */
.player-seats {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}
.seat {
  width: 180px;
  padding: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  text-align: center;
  border: 2px solid transparent;
  transition: all 0.3s;
}
.seat.active { border-color: #2ecc71; background: rgba(46,204,113,0.15); }
.seat.dealer { border-color: #ffd700; }
.seat.folded { opacity: 0.3; }
.seat.allin { border-color: #e74c3c; }
.seat .player-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
.seat .chips { font-size: 20px; color: #ffd700; }
.seat .bet { font-size: 14px; color: #f39c12; margin-top: 4px; }
.seat .dealer-badge {
  display: inline-block; background: #ffd700; color: #333;
  padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
  margin-bottom: 4px;
}
.seat .status-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
}
.seat .status-badge.fold { background: #666; color: white; }
.seat .status-badge.allin { background: #e74c3c; color: white; }

.empty-seat-name { color: #555; font-style: italic; font-size: 14px; }
.waiting-msg {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 32px; color: #888; text-align: center;
}
.qr-area {
  position: absolute; top: 20px; right: 20px;
  background: white; padding: 10px; border-radius: 8px;
}
.qr-area img { width: 100px; height: 100px; }
.qr-area .hint { color: #333; font-size: 11px; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<div class="tv-container">
  <div class="header">
    <div>
      <div class="title">🃏 Poker Night</div>
      <div class="table-code" id="tableCode">扫码入桌</div>
    </div>
    <div class="hand-count" id="handCount">回合 0</div>
  </div>

  <div class="community-area">
    <div class="waiting-msg" id="waitingMsg">
      🍺 等待玩家入桌...<br>
      <span style="font-size: 18px;">扫码加入</span>
    </div>
    <div class="pot-display" id="potDisplay" style="display:none">底池: 0</div>
    <div class="community-cards" id="communityCards">
      <div class="card empty"></div>
      <div class="card empty"></div>
      <div class="card empty"></div>
      <div class="card empty"></div>
      <div class="card empty"></div>
    </div>
    <div class="game-info" id="gameInfo" style="display:none">
      <span class="blind" id="blindInfo">盲注 10/20</span>
      <span class="level" id="levelInfo">Lv 1</span>
      <span class="action-prompt" id="actionPrompt"></span>
    </div>
  </div>

  <div class="player-seats" id="playerSeats">
    <!-- 动态生成 6个座位 -->
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const tableCode = params.get('code') || 'DEMO';

document.getElementById('tableCode').textContent = '桌号: ' + tableCode;

const MAX_SEATS = 6;
const CARD_BACK = '🂠';

// 初始化座位
const seatContainer = document.getElementById('playerSeats');
for (let i = 0; i < MAX_SEATS; i++) {
  const seat = document.createElement('div');
  seat.className = 'seat';
  seat.id = 'seat-' + i;
  seat.innerHTML = `
    <div class="dealer-badge" id="dealer-${i}" style="display:none">D</div>
    <div class="player-name" id="name-${i}"><span class="empty-seat-name">等待入座</span></div>
    <div class="chips" id="chips-${i}">—</div>
    <div class="bet" id="bet-${i}"></div>
  `;
  seatContainer.appendChild(seat);
}

// Socket.IO
const socket = io(window.location.origin, {
  query: { role: 'tv', tableCode }
});

socket.on('connect', () => {
  document.getElementById('waitingMsg').innerHTML = '🃏 已连接<br><span style="font-size:18px;">等待玩家入桌...</span>';
  socket.emit('join_table', { tableCode, playerId: 'tv-' + Date.now(), nickname: 'TV Display' });
});

socket.on('table_state', (state) => {
  document.getElementById('waitingMsg').style.display = 'none';
  document.getElementById('potDisplay').style.display = 'block';
  document.getElementById('gameInfo').style.display = 'flex';
  
  document.getElementById('handCount').textContent = '回合 ' + (state.handCount || 0);
  document.getElementById('potDisplay').textContent = '🪙 底池: ' + (state.pot || 0);
  
  const blinds = state.blinds || {};
  document.getElementById('blindInfo').textContent = `盲注 ${blinds.sb || 10}/${blinds.bb || 20}`;
  document.getElementById('levelInfo').textContent = `Lv ${blinds.level || 1}`;

  // 公共牌
  const cards = state.communityCards || [];
  const cardDivs = document.querySelectorAll('#communityCards .card');
  cardDivs.forEach((div, i) => {
    if (i < cards.length) {
      const card = parseCard(cards[i]);
      div.textContent = card.symbol;
      div.className = 'card dealt ' + (card.color);
      // 小牌先不显示花色
    } else {
      div.innerHTML = '&nbsp;';
      div.className = 'card empty';
    }
  });

  // 玩家座次
  const players = state.players || [];
  const activePlayerId = state.currentTurn;
  
  for (let i = 0; i < MAX_SEATS; i++) {
    const seat = document.getElementById('seat-' + i);
    const player = players.find(p => p.seatIndex === i);
    
    if (player) {
      document.getElementById('name-' + i).textContent = player.nickname || '玩家';
      document.getElementById('chips-' + i).textContent = '💰 ' + (player.chips || 0);
      document.getElementById('bet-' + i).textContent = player.bet > 0 ? '下注 ' + player.bet : '';
      
      document.getElementById('dealer-' + i).style.display = 'none';
      
      seat.className = 'seat';
      if (player.folded) seat.classList.add('folded');
      if (player.isAllIn) seat.classList.add('allin');
      if (activePlayerId && player.id === activePlayerId) seat.classList.add('active');
    } else {
      document.getElementById('name-' + i).innerHTML = '<span class="empty-seat-name">等待入座</span>';
      document.getElementById('chips-' + i).textContent = '—';
      document.getElementById('bet-' + i).textContent = '';
      document.getElementById('dealer-' + i).style.display = 'none';
      seat.className = 'seat';
    }
  }

  // 行动提示
  if (activePlayerId) {
    const activePlayer = players.find(p => p.id === activePlayerId);
    document.getElementById('actionPrompt').textContent = activePlayer ? 
      `🎯 ${activePlayer.nickname} 行动中...` : '';
  }
});

socket.on('hand_started', (data) => {
  if (data.dealer) {
    document.getElementById('dealer-' + data.dealer.seatIndex).style.display = 'inline-block';
  }
  document.getElementById('handCount').textContent = '回合 ' + data.handCount;
  // 清除所有卡牌动画延迟
  document.querySelectorAll('#communityCards .card').forEach(div => {
    div.className = 'card empty';
    div.innerHTML = '&nbsp;';
  });
});

socket.on('community_cards', (data) => {
  const cardDivs = document.querySelectorAll('#communityCards .card');
  const cards = data.cards || [];
  cardDivs.forEach((div, i) => {
    if (i < cards.length) {
      const card = parseCard(cards[i]);
      div.textContent = card.symbol;
      div.className = 'card dealt ' + card.color;
    }
  });
});

socket.on('player_action', (data) => {
  const prompts = {
    fold: '弃牌 🙅', check: '过牌 ✅', call: '跟注 ✅',
    raise: '加注 ⬆️', bet: '下注 ⬆️', allin: 'All-In 🔥'
  };
  const actionText = prompts[data.action] || data.action;
  document.getElementById('actionPrompt').textContent = 
    `${data.nickname}: ${actionText}${data.amount ? ' '+data.amount : ''}`;
  setTimeout(() => {
    if (document.getElementById('actionPrompt').textContent.includes(data.nickname)) {
      // 不清除以免打断实时状态
    }
  }, 3000);
});

socket.on('showdown', (data) => {
  document.getElementById('actionPrompt').textContent = 
    `🏆 ${data.players.map(p => p.nickname).join(', ')} 摊牌!`;
});

socket.on('hand_won', (data) => {
  document.getElementById('actionPrompt').textContent = 
    `🏆 ${data.winner.nickname} 赢得 ${data.pot}!`;
});

socket.on('game_over', (data) => {
  document.getElementById('actionPrompt').textContent = 
    `👑 冠军: ${data.winner.nickname} 🎉`;
});

function parseCard(code) {
  if (!code) return { symbol: '?', color: '' };
  // code like "A♠" or "10♥"
  const suit = code.slice(-1);
  const rank = code.slice(0, -1);
  const isRed = suit === '♥' || suit === '♦';
  return {
    rank,
    suit,
    symbol: code,
    color: isRed ? 'red' : 'black',
  };
}
</script>
</body>
</html>
