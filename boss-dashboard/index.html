<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS 管理端 — 天天扑克锦标赛</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<style>
:root{--gold:#FFD700;--gold2:#c9a227;--bg:#07070c;--panel:rgba(255,255,255,.035);--line:rgba(201,162,39,.22);--txt:#e8e8ec;--dim:#9c9ca8;--green:#3ddc84;--red:#e5484d}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
a{color:var(--gold)}
.glow{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);z-index:0}
.glow-a{top:-260px;left:50%;transform:translateX(-50%);width:820px;height:820px;background:rgba(13,90,50,.34)}
.glow-b{bottom:-200px;right:-200px;width:620px;height:620px;background:rgba(255,215,0,.07)}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1}

/* 顶栏 */
.topbar{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid rgba(201,162,39,.14);margin-bottom:22px}
.topbar img{width:32px;height:32px}
.topbar .t{font-weight:800;font-size:16px;letter-spacing:1px}
.topbar .t span{display:block;font-size:9px;letter-spacing:3px;color:var(--gold2);font-weight:500}
.topbar .who{margin-left:auto;font-size:12px;color:var(--dim)}
.topbar .who b{color:var(--gold);cursor:pointer;margin-left:10px}

/* 登录 */
.login-box{max-width:380px;margin:110px auto;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:36px 30px;text-align:center;backdrop-filter:blur(8px)}
.login-box img{width:56px;height:56px;margin-bottom:14px}
.login-box h1{font-size:20px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#FFE87C,#FFD700 45%,#c9a227);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-box .sub{font-size:12px;color:var(--dim);margin:8px 0 22px}
.inp{width:100%;background:rgba(7,7,12,.72);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 14px;color:var(--txt);font-size:14px;margin-bottom:12px;outline:none}
.inp:focus{border-color:var(--gold2)}
.btn{width:100%;padding:14px;border:0;border-radius:12px;background:linear-gradient(135deg,#FFD700,#c9a227);color:#1a1400;font-size:15px;font-weight:800;cursor:pointer;transition:.2s}
.btn:hover{box-shadow:0 8px 24px rgba(255,215,0,.25)}
.err{color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px}

/* 标签页 */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:var(--panel);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.tab.on{color:#1a1400;background:linear-gradient(135deg,#FFD700,#c9a227);border-color:transparent}
.tab .badge{display:inline-block;min-width:18px;padding:1px 5px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;margin-left:6px}

/* 卡片与表格 */
.card{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:22px;backdrop-filter:blur(8px);margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:rgba(7,7,12,.5);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 12px;text-align:center}
.stat b{display:block;font-size:22px;color:var(--gold);font-weight:900}
.stat.warn b{color:var(--red)}
.stat span{font-size:11px;color:var(--dim)}
.sec-t{font-size:14px;font-weight:800;color:var(--gold);margin:4px 0 12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
th{color:var(--gold2);font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap}
td{color:var(--txt)}
tr.sub td{background:rgba(255,215,0,.03)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(255,215,0,.04)}
.pill{display:inline-block;padding:2px 10px;border-radius:9px;font-size:11px;font-weight:700}
.pill.active{background:rgba(61,220,132,.14);color:var(--green)}
.pill.frozen{background:rgba(229,72,77,.14);color:var(--red)}
.pill.pending{background:rgba(255,215,0,.14);color:var(--gold)}
.pill.paid{background:rgba(61,220,132,.14);color:var(--green)}
.pill.rejected{background:rgba(229,72,77,.14);color:var(--red)}
.pill.master{background:rgba(255,215,0,.14);color:var(--gold)}
.mini{padding:5px 12px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.mini:hover{background:rgba(255,215,0,.08)}
.mini.danger{color:var(--red);border-color:rgba(229,72,77,.3)}
.mini.danger:hover{background:rgba(229,72,77,.08)}
.mini.green{color:var(--green);border-color:rgba(61,220,132,.3)}
.mini.green:hover{background:rgba(61,220,132,.08)}
.rate-inp{width:56px;background:rgba(7,7,12,.72);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 8px;color:var(--txt);font-size:13px;text-align:center;outline:none}
.rate-inp:focus{border-color:var(--gold2)}
select.sel{background:rgba(7,7,12,.9);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 8px;color:var(--txt);font-size:12px;outline:none;max-width:150px}
.dim{color:var(--dim);font-size:12px}
.money{color:var(--gold);font-weight:700}
.empty{text-align:center;color:var(--dim);font-size:13px;padding:30px 0}

/* 详情抽屉 */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:60;display:flex;justify-content:flex-end}
.drawer{width:min(560px,94vw);height:100%;overflow-y:auto;background:#0b0b12;border-left:1px solid var(--line);padding:26px 24px 60px}
.drawer h2{font-size:18px;font-weight:900;color:var(--gold);margin-bottom:4px}
.drawer .close{float:right;background:none;border:1px solid var(--line);color:var(--gold);border-radius:9px;padding:5px 12px;cursor:pointer;font-size:13px}
.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0}
.kv div{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--dim)}
.kv b{display:block;color:var(--txt);font-size:14px;margin-top:2px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(20,20,28,.95);border:1px solid var(--line);color:var(--gold);padding:11px 22px;border-radius:12px;font-size:13px;z-index:99;box-shadow:0 10px 30px rgba(0,0,0,.5)}
@media(max-width:760px){th:nth-child(6),td:nth-child(6){display:none}.kv{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="glow glow-a"></div><div class="glow glow-b"></div>

<!-- 登录视图 -->
<div id="viewLogin">
  <div class="login-box">
    <img src="/assets/logo.svg" alt="Logo">
    <h1>BOSS 管理端</h1>
    <div class="sub">天天扑克锦标赛 · 平台管理</div>
    <div class="err" id="loginErr"></div>
    <input class="inp" id="uInput" placeholder="账号" autocomplete="username">
    <input class="inp" id="pInput" type="password" placeholder="密码" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 主视图 -->
<div id="viewMain" style="display:none">
  <div class="wrap">
    <div class="topbar">
      <img src="/assets/logo.svg" alt="">
      <div class="t">BOSS 管理端<span>TIANTIAN POKER</span></div>
      <div class="who"><span id="whoName"></span><b onclick="doLogout()">退出</b></div>
    </div>
    <div class="tabs">
      <div class="tab on" data-tab="overview" onclick="switchTab('overview')">📊 概览</div>
      <div class="tab" data-tab="agents" onclick="switchTab('agents')">🤝 代理商</div>
      <div class="tab" data-tab="withdrawals" onclick="switchTab('withdrawals')">💸 提现审核<span class="badge" id="wdBadge" style="display:none"></span></div>
      <div class="tab" data-tab="venues" onclick="switchTab('venues')">🏪 门店</div>
    </div>
    <div id="tabBody"></div>
  </div>
</div>

<script>
const API = '/boss/api/v1/boss';
let token = localStorage.getItem('boss_token') || '';
let bossName = localStorage.getItem('boss_name') || '';
let curTab = 'overview';
let agentsCache = [];

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const yuan = fen => '¥' + (Number(fen || 0) / 100).toFixed(2);
const fmtT = d => { if (!d) return '-'; const t = new Date(d); const p = n => String(n).padStart(2,'0'); return `${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())} ${p(t.getHours())}:${p(t.getMinutes())}`; };

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

async function api(path, method, body) {
  const r = await fetch(API + path, {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  let data = null;
  try { data = await r.json(); } catch {}
  if (r.status === 401) { doLogout(); throw new Error('登录已过期'); }
  if (!r.ok) throw new Error((data && data.error) || ('HTTP ' + r.status));
  return data;
}

// ============ 登录 ============
async function doLogin() {
  $('loginErr').textContent = '';
  const username = $('uInput').value.trim(), password = $('pInput').value;
  if (!username || !password) { $('loginErr').textContent = '请输入账号和密码'; return; }
  try {
    const r = await fetch(API + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const d = await r.json();
    if (!r.ok) { $('loginErr').textContent = d.error || '登录失败'; return; }
    token = d.token; bossName = d.name || username;
    localStorage.setItem('boss_token', token);
    localStorage.setItem('boss_name', bossName);
    enterMain();
  } catch (e) { $('loginErr').textContent = '网络异常：' + e.message; }
}
function doLogout() {
  token = ''; bossName = '';
  localStorage.removeItem('boss_token');
  localStorage.removeItem('boss_name');
  $('viewMain').style.display = 'none';
  $('viewLogin').style.display = 'block';
}
function enterMain() {
  $('viewLogin').style.display = 'none';
  $('viewMain').style.display = 'block';
  $('whoName').textContent = bossName;
  switchTab('overview');
  refreshWdBadge();
}
document.addEventListener('keydown', e => { if (e.key === 'Enter' && $('viewLogin').style.display !== 'none') doLogin(); });

// ============ 标签页 ============
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  $('tabBody').innerHTML = '<div class="empty">加载中…</div>';
  ({ overview: renderOverview, agents: renderAgents, withdrawals: renderWithdrawals, venues: renderVenues })[tab]();
}

// ============ 概览 ============
async function renderOverview() {
  const d = await api('/overview');
  const o = d.orders, a = d.agents;
  $('tabBody').innerHTML = `
    <div class="card"><div class="sec-t">平台总览</div><div class="stats">
      <div class="stat"><b>${a.total}</b><span>代理商总数</span></div>
      <div class="stat"><b>${a.masters}</b><span>其中总代</span></div>
      <div class="stat"><b>${a.active}</b><span>活跃代理</span></div>
      <div class="stat"><b>${d.venues.total}</b><span>门店数</span></div>
    </div></div>
    <div class="card"><div class="sec-t">交易与分账（累计，仅已支付）</div><div class="stats">
      <div class="stat"><b>${o.paid_count}</b><span>支付订单数</span></div>
      <div class="stat"><b>${yuan(o.gmv)}</b><span>总流水 GMV</span></div>
      <div class="stat"><b>${yuan(o.platform_income)}</b><span>平台收入</span></div>
      <div class="stat"><b>${yuan(o.venue_income)}</b><span>门店分成</span></div>
      <div class="stat"><b>${yuan(o.agent_commission)}</b><span>代理佣金</span></div>
      <div class="stat"><b>${yuan(d.today.gmv)}</b><span>今日流水（${d.today.paid_count} 单）</span></div>
    </div></div>
    <div class="card"><div class="sec-t">待办</div><div class="stats">
      <div class="stat warn"><b>${d.withdrawals.pending_count}</b><span>待审提现</span></div>
      <div class="stat warn"><b>${yuan(d.withdrawals.pending_amount)}</b><span>待审金额</span></div>
    </div>
    ${Number(d.withdrawals.pending_count) > 0 ? '<div style="margin-top:14px"><button class="mini" onclick="switchTab(\'withdrawals\')">去审核 →</button></div>' : ''}
    </div>`;
}

// ============ 代理商 ============
async function renderAgents() {
  const d = await api('/agents');
  agentsCache = d.agents;
  const rows = d.agents.map(a => {
    const isMaster = !a.parent_id;
    return `<tr class="clickable ${isMaster ? '' : 'sub'}" onclick="openAgent('${a.id}')">
      <td>${isMaster ? '<span class="pill master">总代</span> ' : '└ '}<b>${esc(a.code)}</b></td>
      <td>${esc(a.name)}</td>
      <td class="dim">${esc(a.email || '-')}</td>
      <td><input class="rate-inp" type="number" min="0" max="70" value="${a.rate}" id="rate-${a.id}" onclick="event.stopPropagation()"> <button class="mini" onclick="event.stopPropagation();saveRate('${a.id}')">存</button></td>
      <td><span class="pill ${a.status}">${a.status === 'active' ? '正常' : '冻结'}</span></td>
      <td>${a.sub_count} 下级 / ${a.venue_count} 店</td>
      <td class="money">${yuan(a.commission_total)}</td>
      <td>${a.status === 'active'
        ? `<button class="mini danger" onclick="event.stopPropagation();setStatus('${a.id}','frozen')">冻结</button>`
        : `<button class="mini green" onclick="event.stopPropagation();setStatus('${a.id}','active')">启用</button>`}</td>
    </tr>`;
  }).join('');
  $('tabBody').innerHTML = `<div class="card"><div class="sec-t">代理商（点击行看详情）</div>
    <div style="overflow-x:auto"><table>
      <tr><th>层级/邀请码</th><th>名称</th><th>邮箱</th><th>分成率%</th><th>状态</th><th>规模</th><th>累计佣金</th><th>操作</th></tr>
      ${rows || '<tr><td colspan="8" class="empty">暂无代理商</td></tr>'}
    </table></div></div>`;
}
async function saveRate(id) {
  const v = $(`rate-${id}`).value;
  try {
    await api('/agents/' + id, 'PATCH', { rate: Number(v) });
    toast('分成率已保存');
  } catch (e) { toast('保存失败：' + e.message); }
}
async function setStatus(id, status) {
  try {
    await api('/agents/' + id, 'PATCH', { status });
    toast(status === 'frozen' ? '已冻结' : '已启用');
    renderAgents();
  } catch (e) { toast('操作失败：' + e.message); }
}

// 代理详情抽屉
async function openAgent(id) {
  const d = await api('/agents/' + id);
  const a = d.agent;
  const subs = d.subagents.map(s => `<tr><td><b>${esc(s.code)}</b></td><td>${esc(s.name)}</td><td>${s.rate}%</td><td><span class="pill ${s.status}">${s.status === 'active' ? '正常' : '冻结'}</span></td></tr>`).join('');
  const venues = d.venues.map(v => `<tr><td>${esc(v.name)}</td><td>${v.table_count}</td><td class="money">${yuan(v.gmv_total)}</td></tr>`).join('');
  const wds = d.withdrawals.map(w => `<tr><td>${yuan(w.amount)}</td><td><span class="pill ${w.status}">${w.status}</span></td><td class="dim">${fmtT(w.created_at)}</td></tr>`).join('');
  const orders = d.orders.map(o => `<tr><td class="money">${yuan(o.amount)}</td><td>${yuan(o.agent_income + o.master_agent_income)}</td><td class="dim">${esc(o.venue_name || '-')}</td><td class="dim">${fmtT(o.at)}</td></tr>`).join('');
  const mask = document.createElement('div');
  mask.className = 'mask';
  mask.onclick = e => { if (e.target === mask) mask.remove(); };
  mask.innerHTML = `<div class="drawer">
    <button class="close" onclick="this.closest('.mask').remove()">✕ 关闭</button>
    <h2>${esc(a.name)} <span class="pill ${a.parent_id ? '' : 'master'}">${a.parent_id ? '代理' : '总代'}</span></h2>
    <div class="dim">邀请码 ${esc(a.code)}${a.parent_code ? ' · 上级 ' + esc(a.parent_name) + ' (' + esc(a.parent_code) + ')' : ''}</div>
    <div class="kv">
      <div>邮箱<b>${esc(a.email || '-')}</b></div>
      <div>状态<b>${a.status === 'active' ? '正常' : '冻结'}</b></div>
      <div>分成率<b>${a.rate}%</b></div>
      <div>累计佣金<b class="money" style="color:var(--gold)">${yuan(d.commission_total)}</b></div>
      <div>注册时间<b>${fmtT(a.created_at)}</b></div>
    </div>
    <div class="sec-t">下级代理（${d.subagents.length}）</div>
    ${subs ? `<table><tr><th>邀请码</th><th>名称</th><th>率</th><th>状态</th></tr>${subs}</table>` : '<div class="empty">无</div>'}
    <div class="sec-t" style="margin-top:18px">名下门店（${d.venues.length}）</div>
    ${venues ? `<table><tr><th>门店</th><th>桌数</th><th>累计流水</th></tr>${venues}</table>` : '<div class="empty">无</div>'}
    <div class="sec-t" style="margin-top:18px">近期提现（${d.withdrawals.length}）</div>
    ${wds ? `<table><tr><th>金额</th><th>状态</th><th>时间</th></tr>${wds}</table>` : '<div class="empty">无</div>'}
    <div class="sec-t" style="margin-top:18px">近期分佣订单（${d.orders.length}）</div>
    ${orders ? `<table><tr><th>订单额</th><th>佣金</th><th>门店</th><th>时间</th></tr>${orders}</table>` : '<div class="empty">无</div>'}
  </div>`;
  document.body.appendChild(mask);
}

// ============ 提现审核 ============
async function renderWithdrawals() {
  const d = await api('/withdrawals');
  const rows = d.withdrawals.map(w => `<tr>
    <td><b>${esc(w.agent_name)}</b><div class="dim">${esc(w.agent_code)} · ${esc(w.agent_email || '-')}</div></td>
    <td class="money">${yuan(w.amount)}</td>
    <td><span class="pill ${w.status}">${{ pending: '待审核', paid: '已打款', rejected: '已驳回' }[w.status] || w.status}</span></td>
    <td class="dim">${fmtT(w.created_at)}</td>
    <td class="dim">${w.status === 'paid' ? fmtT(w.paid_at) : (w.note || '-')}</td>
    <td>${w.status === 'pending'
      ? `<button class="mini green" onclick="review('${w.id}','paid')">确认打款</button> <button class="mini danger" onclick="review('${w.id}','reject')">驳回</button>`
      : ''}</td>
  </tr>`).join('');
  $('tabBody').innerHTML = `<div class="card"><div class="sec-t">提现申请（待审优先）</div>
    <div style="overflow-x:auto"><table>
      <tr><th>代理</th><th>金额</th><th>状态</th><th>申请时间</th><th>打款/备注</th><th>操作</th></tr>
      ${rows || '<tr><td colspan="6" class="empty">暂无提现申请</td></tr>'}
    </table></div></div>`;
}
async function review(id, action) {
  let note = '';
  if (action === 'reject') {
    note = prompt('驳回原因（可选）') || '';
    if (note === null) return;
  } else if (!confirm('确认已线下打款？')) return;
  try {
    await api('/withdrawals/' + id + '/review', 'POST', { action, note });
    toast(action === 'paid' ? '已标记打款' : '已驳回');
    renderWithdrawals();
    refreshWdBadge();
  } catch (e) { toast('操作失败：' + e.message); }
}
async function refreshWdBadge() {
  try {
    const d = await api('/withdrawals?status=pending');
    const n = d.withdrawals.length;
    $('wdBadge').style.display = n > 0 ? 'inline-block' : 'none';
    $('wdBadge').textContent = n;
  } catch {}
}

// ============ 门店 ============
async function renderVenues() {
  const [vd, ad] = await Promise.all([api('/venues'), agentsCache.length ? { agents: agentsCache } : api('/agents')]);
  agentsCache = ad.agents;
  const activeAgents = ad.agents.filter(a => a.status === 'active');
  const opts = sel => `<option value="">（未绑定）</option>` + activeAgents.map(a =>
    `<option value="${a.id}" ${a.id === sel ? 'selected' : ''}>${esc(a.name)} (${esc(a.code)})</option>`).join('');
  const rows = vd.venues.map(v => `<tr>
    <td><b>${esc(v.name)}</b></td>
    <td>${v.table_count}</td>
    <td class="money">${yuan(v.gmv_total)}</td>
    <td>${v.agent_name ? `${esc(v.agent_name)} <span class="dim">(${esc(v.agent_code)})</span>` : '<span class="dim">未绑定</span>'}</td>
    <td><select class="sel" id="vb-${v.id}">${opts(v.agent_id)}</select>
        <button class="mini" onclick="rebind('${v.id}')">保存</button></td>
  </tr>`).join('');
  $('tabBody').innerHTML = `<div class="card"><div class="sec-t">门店代理绑定</div>
    <div style="overflow-x:auto"><table>
      <tr><th>门店</th><th>桌数</th><th>累计流水</th><th>当前代理</th><th>换绑</th></tr>
      ${rows || '<tr><td colspan="5" class="empty">暂无门店</td></tr>'}
    </table></div></div>`;
}
async function rebind(id) {
  const agentId = $(`vb-${id}`).value || null;
  try {
    await api('/venues/' + id, 'PATCH', { agentId });
    toast('已保存绑定');
    renderVenues();
  } catch (e) { toast('保存失败：' + e.message); }
}

// ============ 启动 ============
if (token) { $('whoName').textContent = bossName; enterMain(); }
</script>
</body>
</html>
