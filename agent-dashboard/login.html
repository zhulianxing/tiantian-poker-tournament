<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天天扑克锦标赛 · 代理后台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">
  <style>
    .code-row{display:flex;gap:10px}
    .code-row input{flex:1}
    .code-row .btn-code{flex-shrink:0;padding:0 16px;border:1px solid var(--gold-border);background:var(--gold-dim);color:var(--gold);border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s}
    .code-row .btn-code:disabled{opacity:.45;cursor:not-allowed}
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <h1>♠️ 天天扑克锦标赛</h1>
      <p>代理管理后台</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="email" placeholder="请输入注册邮箱" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>邮箱验证码</label>
        <div class="code-row">
          <input type="text" id="code" placeholder="6 位验证码" required autocomplete="off" maxlength="6">
          <button type="button" class="btn-code" id="sendBtn">发送验证码</button>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-block" id="loginBtn">登 录</button>
    </form>
    <div class="login-links">
      还不是代理？<a href="register.html">¥299 注册开通</a>
    </div>
  </div>
</div>

<script>
  // Redirect to dashboard if already logged in
  const token = localStorage.getItem('pn_agent_token');
  if (token) {
    window.location.href = 'index.html';
  }

  // 发送验证码（60 秒倒计时）
  document.getElementById('sendBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showToast('请先输入邮箱', 'error'); return; }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    try {
      const res = await fetch('/agents/api/v1/agent/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, purpose: 'login' })
      });
      const data = await res.json();
      if (!res.ok) {
        const msg = res.status === 404 ? '该邮箱未注册代理账号'
                  : res.status === 429 ? '发送太频繁，请稍后再试'
                  : (data.error || '发送失败');
        throw new Error(msg);
      }
      showToast('验证码已发送，请查收邮件', 'success');
      let left = 60;
      btn.textContent = left + 's';
      const timer = setInterval(() => {
        left--;
        if (left <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '发送验证码'; }
        else btn.textContent = left + 's';
      }, 1000);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
    }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('email').value.trim();
    const code = document.getElementById('code').value.trim();

    if (!email || !code) return;

    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
      const res = await fetch('/agents/api/v1/agent/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('pn_agent_token', data.token);
        localStorage.setItem('pn_agent_info', JSON.stringify(data.agent || {}));
        window.location.href = 'index.html';
      } else {
        showToast(data.message || data.error || '登录失败', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    } catch (err) {
      showToast('网络错误，请稍后重试', 'error');
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  });

  function showToast(msg, type) {
    const container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || '');
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); container.remove(); }, 3000);
  }
</script>

</body>
</html>
