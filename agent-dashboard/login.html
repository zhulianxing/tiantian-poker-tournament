<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天天扑克锦标赛 · 代理后台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <h1>♠️ 天天扑克锦标赛</h1>
      <p>代理管理后台</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>手机号</label>
        <input type="text" id="phone" placeholder="请输入手机号" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-gold btn-block" id="loginBtn">登 录</button>
    </form>
    <div class="login-links">
      还不是代理？<a href="register.html">¥299 注册开通</a>
    </div>
  </div>
</div>

<script>
  // Redirect to dashboard if already logged in
  const token = localStorage.getItem('pn_agent_token');
  if (token) {
    window.location.href = 'index.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    if (!phone || !password) return;

    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
      const res = await fetch('/agents/api/v1/agent/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('pn_agent_token', data.token);
        localStorage.setItem('pn_agent_info', JSON.stringify(data.agent || {}));
        window.location.href = 'index.html';
      } else {
        showToast(data.message || data.error || '登录失败', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    } catch (err) {
      showToast('网络错误，请稍后重试', 'error');
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  });

  function showToast(msg, type) {
    const container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || '');
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); container.remove(); }, 3000);
  }
</script>

</body>
</html>
