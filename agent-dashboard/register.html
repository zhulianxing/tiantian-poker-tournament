<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天天扑克锦标赛 · 代理注册</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">
  <style>
    .price-box{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:12px;padding:16px;margin:4px 0 16px;text-align:center}
    .price-box .p-main{font-size:24px;font-weight:800;color:var(--gold)}
    .price-box .p-sub{font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.7}
    .pay-methods{display:flex;flex-direction:column;gap:10px;margin-top:6px}
    .pay-methods .btn{display:flex;align-items:center;justify-content:center;gap:8px}
    .pay-note{font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px;line-height:1.7}
    .code-row{display:flex;gap:10px}
    .code-row input{flex:1}
    .code-row .btn-code{flex-shrink:0;padding:0 16px;border:1px solid var(--gold-border);background:var(--gold-dim);color:var(--gold);border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s}
    .code-row .btn-code:disabled{opacity:.45;cursor:not-allowed}
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <h1>♠️ 天天扑克锦标赛</h1>
      <p>代理注册 · 支付开通</p>
    </div>
    <div id="registerArea">
      <form id="registerForm">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="name" placeholder="请输入姓名" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" placeholder="请输入邮箱（登录账号）" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>邮箱验证码</label>
          <div class="code-row">
            <input type="text" id="emailCode" placeholder="6 位验证码" required autocomplete="off" maxlength="6">
            <button type="button" class="btn-code" id="sendBtn">发送验证码</button>
          </div>
        </div>
        <div class="form-group">
          <label>邀请码（选填）</label>
          <input type="text" id="inviteCode" placeholder="选填：有上级代理邀请码时填写" autocomplete="off">
        </div>

        <div class="price-box">
          <div class="p-main">¥299 或 50 USDT</div>
          <div class="p-sub">一次性开通费 · 支付成功即激活代理账号<br>不开具任何形式的收益承诺</div>
        </div>

        <div class="pay-methods">
          <button type="button" class="btn btn-gold btn-block" data-method="wechat">微信支付 ¥299</button>
          <button type="button" class="btn btn-gold btn-block" data-method="alipay">支付宝 ¥299</button>
          <button type="button" class="btn btn-gold btn-block" data-method="usdt">USDT 支付 50</button>
        </div>
        <div class="pay-note">支付成功后系统自动开通账号并生成你的专属邀请码<br>有邀请码注册为下级代理，无邀请码注册为总代</div>
      </form>
      <div class="login-links">
        已有账号？<a href="login.html">直接登录</a>
      </div>
    </div>
  </div>
</div>

<script>
  // 支持 URL ?code=XXX 预填邀请码
  const presetCode = new URLSearchParams(window.location.search).get('code');
  if (presetCode) {
    document.getElementById('inviteCode').value = presetCode.toUpperCase();
  }

  let paying = false;

  // 发送注册验证码（60 秒倒计时）
  document.getElementById('sendBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showToast('请先输入邮箱', 'error'); return; }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    try {
      const res = await fetch('/agents/api/v1/agent/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, purpose: 'register' })
      });
      const data = await res.json();
      if (!res.ok) {
        const msg = res.status === 409 ? '该邮箱已注册，请直接登录'
                  : res.status === 429 ? '发送太频繁，请稍后再试'
                  : (data.error || '发送失败');
        throw new Error(msg);
      }
      showToast('验证码已发送，请查收邮件', 'success');
      let left = 60;
      btn.textContent = left + 's';
      const timer = setInterval(() => {
        left--;
        if (left <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '发送验证码'; }
        else btn.textContent = left + 's';
      }, 1000);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
    }
  });

  document.querySelectorAll('.pay-methods button').forEach(btn => {
    btn.addEventListener('click', () => submitSignup(btn.dataset.method, btn));
  });

  async function submitSignup(method, btn) {
    if (paying) return;
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const emailCode = document.getElementById('emailCode').value.trim();
    const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();

    if (!name || !email || !emailCode) {
      showToast('请先填写姓名、邮箱和验证码', 'error');
      return;
    }

    paying = true;
    const originText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '创建订单中...';

    try {
      const res = await fetch('/pay/api/v1/payment/agent-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, emailCode, inviteCode: inviteCode || undefined, paymentMethod: method })
      });
      const data = await res.json();

      if (!res.ok) {
        const msg = res.status === 409 ? '该邮箱已注册，请直接登录'
                  : (data.error === 'invalid invite code' ? '邀请码无效，请核对后重试'
                  : (data.error === 'invalid or expired email code' ? '验证码错误或已过期，请重新获取'
                  : (data.error || data.message || '创建订单失败')));
        throw new Error(msg);
      }

      if (method === 'usdt') {
        // 留在本站打开 USDT 收银台（保留当前域名）
        window.location.href = '/pay/usdt-pay.html?order=' + encodeURIComponent(data.orderId);
      } else if (data.payUrl) {
        window.location.href = data.payUrl;
      } else {
        throw new Error('未获取到支付地址');
      }
    } catch (err) {
      showToast(err.message || '网络错误，请稍后重试', 'error');
      paying = false;
      btn.disabled = false;
      btn.textContent = originText;
    }
  }

  function showToast(msg, type) {
    const container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || '');
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); container.remove(); }, 3000);
  }
</script>

</body>
</html>
