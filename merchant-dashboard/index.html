<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天天扑克锦标赛 · 商户后台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">
</head>
<body>

<!-- Mobile toggle -->
<button class="mobile-toggle" id="mobileToggle">☰</button>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">♠</div>
      <span>天天扑克锦标赛</span>
    </div>
    <nav class="nav-menu" id="navMenu">
      <div class="nav-item active" data-route="dashboard">
        <span class="nav-icon">📊</span> 数据看板
      </div>
      <div class="nav-item" data-route="orders">
        <span class="nav-icon">📋</span> 订单管理
      </div>
      <div class="nav-item" data-route="devices">
        <span class="nav-icon">📱</span> 设备管理
      </div>
      <div class="nav-item" data-route="settlements">
        <span class="nav-icon">💰</span> 结算管理
      </div>
      <div class="nav-item" data-route="refunds">
        <span class="nav-icon">↩️</span> 退款管理
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="merchant-info" id="merchantInfo">--</div>
      <button class="btn-logout" id="logoutBtn">退出登录</button>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-title" id="pageTitle">数据看板</div>
      <div class="topbar-right">
        <span id="currentTime"></span>
      </div>
    </header>
    <div class="content-area" id="contentArea">
      <!-- Content rendered by app.js -->
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <!-- Modal content injected by app.js -->
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="app.js"></script>
</body>
</html>
